<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Available Where You Are</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Connectivity, cost and data-residency rules should not lock people out of AI assistance.
  </text>

  <rect x="90" y="285" width="850" height="500" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="515" y="365" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">The challenge</text>
  <rect x="395" y="395" width="240" height="3" fill="#8b7fd4"/>
  <text x="140" y="480" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- cloud Copilot needs a reliable</text>
  <text x="140" y="520" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">  connection</text>
  <text x="140" y="580" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- some regions and networks restrict it</text>
  <text x="140" y="640" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- data-residency rules can block</text>
  <text x="140" y="680" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">  cloud inference entirely</text>

  <rect x="980" y="285" width="850" height="500" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1405" y="365" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Local models help</text>
  <rect x="1285" y="395" width="240" height="3" fill="#8b7fd4"/>
  <text x="1030" y="480" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- run open models locally with Ollama</text>
  <text x="1030" y="540" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- works offline and on slow networks</text>
  <text x="1030" y="600" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- keeps tooling reachable for more</text>
  <text x="1030" y="640" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">  developers</text>
  <text x="1030" y="700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- explored hands-on in the next slides</text>

  <rect x="430" y="850" width="1060" height="70" rx="35" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="895" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">Local models extend AI assistance beyond the well-connected.</text>

  <text x="960" y="970" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">Inclusive AI should work offline and with limited connectivity and computing resources.</text>
</svg>
