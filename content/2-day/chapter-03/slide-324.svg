<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">GitHub Copilot Architecture</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    High level flow: local prompt assembly, GitHub service controls, then hosted model inference.
  </text>

  <rect x="105" y="320" width="480" height="430" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="345" y="395" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">On your computer</text>
  <rect x="225" y="425" width="240" height="3" fill="#8b7fd4"/>
  <text x="155" y="505" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- VS Code / IDE extension</text>
  <text x="155" y="565" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- gathers prompt and context</text>
  <text x="155" y="625" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- renders suggestions and chat UI</text>

  <text x="655" y="550" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="84" font-weight="700" fill="#8b7fd4" opacity="0.8">&#x2192;</text>

  <rect x="720" y="320" width="480" height="430" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="395" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">GitHub proxy / control plane</text>
  <rect x="810" y="425" width="300" height="3" fill="#8b7fd4"/>
  <text x="770" y="505" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- auth, policy, and routing</text>
  <text x="770" y="565" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- filtering and safety controls</text>
  <text x="770" y="625" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- logging, telemetry, abuse checks</text>

  <text x="1270" y="550" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="84" font-weight="700" fill="#8b7fd4" opacity="0.8">&#x2192;</text>

  <rect x="1335" y="320" width="480" height="430" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1575" y="395" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Hosted cloud models</text>
  <rect x="1455" y="425" width="240" height="3" fill="#8b7fd4"/>
  <text x="1385" y="505" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- perform the inference</text>
  <text x="1385" y="565" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- generate suggestions or answers</text>
  <text x="1385" y="625" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- send the result back to the IDE</text>

  <path d="M1575 795 C1575 885 345 885 345 795" fill="none" stroke="#8b7fd4" stroke-width="3" stroke-dasharray="10 10" opacity="0.8"/>
  <text x="960" y="930" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#ffffff">Prompt goes right, answer comes back left.</text>
</svg>
