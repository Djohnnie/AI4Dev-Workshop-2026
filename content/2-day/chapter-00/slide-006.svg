<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Before We Start — Set Up Your Laptop</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- Subtitle -->
  <text x="960" y="210"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea" text-anchor="middle">Download and install the following tools — both are free and available for Windows, macOS, and Linux</text>

  <!-- ── Card 1: .NET 10 SDK ── -->
  <rect x="100" y="260" width="820" height="720" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>  <!-- .NET logo icon -->
  <image
    href="data:image/png;base64,"
    x="280" y="300"
    width="460" height="200"
    preserveAspectRatio="xMidYMid meet"/>  <!-- Product name -->
  <text x="510" y="558"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">.NET 10 SDK</text>

  <!-- Description lines -->
  <text x="510" y="618"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">Runtime, compiler, and CLI tools</text>
  <text x="510" y="658"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">for building .NET applications</text>

  <!-- Divider -->
  <rect x="160" y="700" width="700" height="2" fill="#8b7fd4" fill-opacity="0.4"/>

  <!-- URL label -->
  <text x="510" y="754"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="600" fill="#8b7fd4" text-anchor="middle">Download at</text>
  <text x="510" y="800"
    font-family="'Consolas', 'Courier New', monospace"
    font-size="32" font-weight="400" fill="#ffffff" text-anchor="middle">https://dot.net/download</text>

  <!-- Install note -->
  <text x="510" y="862"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Choose the SDK installer for your OS.</text>
  <text x="510" y="898"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Verify with: <tspan font-family="'Consolas', 'Courier New', monospace" fill="#8b7fd4">dotnet --version</tspan></text>

  <!-- ── Card 2: Visual Studio Code ── -->
  <rect x="1000" y="260" width="820" height="720" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>  <!-- VS Code logo icon -->
  <image
    href="data:image/svg+xml;base64,"
    x="1245" y="295"
    width="330" height="210"
    preserveAspectRatio="xMidYMid meet"/>
  <!-- Product name -->
  <text x="1410" y="558"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="48" font-weight="700" fill="#ffffff" text-anchor="middle">Visual Studio Code</text>

  <!-- Description lines -->
  <text x="1410" y="618"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">Lightweight editor with built-in Git,</text>
  <text x="1410" y="658"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">extensions, and AI coding support</text>

  <!-- Divider -->
  <rect x="1060" y="700" width="700" height="2" fill="#8b7fd4" fill-opacity="0.4"/>

  <!-- URL label -->
  <text x="1410" y="754"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="600" fill="#8b7fd4" text-anchor="middle">Download at</text>
  <text x="1410" y="800"
    font-family="'Consolas', 'Courier New', monospace"
    font-size="32" font-weight="400" fill="#ffffff" text-anchor="middle">https://code.visualstudio.com</text>

  <!-- Install note -->
  <text x="1410" y="862"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Use the stable release for your OS.</text>
  <text x="1410" y="898"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">Verify with: <tspan font-family="'Consolas', 'Courier New', monospace" fill="#8b7fd4">code --version</tspan></text>
</svg>
