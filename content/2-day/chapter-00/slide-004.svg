<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4" rx="0"/>

  <!-- Title -->
  <text
    x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-1">Who are you?</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4" rx="0"/>

  <!-- Bullet 1 -->
  <circle cx="160" cy="416" r="10" fill="#8b7fd4"/>
  <text x="200" y="430" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#c4baea" letter-spacing="1">What is your first name?</text>

  <!-- Bullet 2 -->
  <circle cx="160" cy="516" r="10" fill="#8b7fd4"/>
  <text x="200" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#c4baea" letter-spacing="1">What is your function title?</text>

  <!-- Bullet 3 -->
  <circle cx="160" cy="616" r="10" fill="#8b7fd4"/>
  <text x="200" y="630" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#c4baea" letter-spacing="1">How are you using GenAI today?</text>

  <!-- Bullet 4 -->
  <circle cx="160" cy="716" r="10" fill="#8b7fd4"/>
  <text x="200" y="730" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#c4baea" letter-spacing="1">Are you using GitHub Copilot today?</text>

  <!-- Bullet 5 -->
  <circle cx="160" cy="816" r="10" fill="#8b7fd4"/>
  <text x="200" y="830" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="300" fill="#c4baea" letter-spacing="1">What do you want to learn?</text>
</svg>
