<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">My Stance on GenAI Tooling</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="960" y="215"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea" text-anchor="middle">Skeptical two years ago. Still skeptical today. More convinced by practical value.</text>

  <rect x="80" y="290" width="540" height="520" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="690" y="290" width="540" height="520" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <rect x="1300" y="290" width="540" height="520" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>

  <text x="350" y="370"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">Two years ago</text>
  <text x="350" y="455"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">I had real doubts about the hype,</text>
  <text x="350" y="500"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">the quality, and the risk of trading</text>
  <text x="350" y="545"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">craftsmanship for convenience.</text>

  <text x="960" y="370"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">Today</text>
  <text x="960" y="455"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">I still have doubts, but I also see</text>
  <text x="960" y="500"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">how these tools can speed up delivery</text>
  <text x="960" y="545"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">and help us produce high-quality results.</text>

  <text x="1570" y="370"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="42" font-weight="700" fill="#ffffff" text-anchor="middle">Our responsibility</text>
  <text x="1570" y="455"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">We need to show management</text>
  <text x="1570" y="500"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">what works, what does not, and where</text>
  <text x="1570" y="545"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="300" fill="#c4baea" text-anchor="middle">human judgment still matters most.</text>

  <rect x="80" y="865" width="1760" height="120" rx="20" fill="#1e1a39" fill-opacity="0.55" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="925"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff" text-anchor="middle">Do not reject GenAI instantly. Do not adopt it blindly.</text>
  <text x="960" y="965"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">Use it critically, measure the outcome, and keep accountability with the team.</text>
</svg>
