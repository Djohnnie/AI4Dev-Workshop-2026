  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="49" font-weight="700" fill="#ffffff" letter-spacing="-1">Use AI Like a Junior Developer - Diagnose, Then Validate</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea" letter-spacing="1">Do not outsource the whole investigation. Bring AI a hypothesis,</text>
  <text x="80" y="241" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea" letter-spacing="1">a narrowed scope, and a specific question.</text>

  <rect x="140" y="300" width="1640" height="430" rx="30" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>

  <circle cx="300" cy="510" r="62" fill="#8b7fd4" opacity="0.28"/>
  <text x="300" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">1</text>
  <text x="300" y="620" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Reproduce</text>
  <text x="300" y="656" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">Get exact steps</text>
  <text x="300" y="684" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">or exact symptoms</text>

  <line x1="365" y1="510" x2="535" y2="510" stroke="#8b7fd4" stroke-width="4" opacity="0.6"/>

  <circle cx="620" cy="510" r="62" fill="#8b7fd4" opacity="0.28"/>
  <text x="620" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">2</text>
  <text x="620" y="620" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Locate</text>
  <text x="620" y="656" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">Find the relevant code</text>
  <text x="620" y="684" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">with free tools</text>

  <line x1="685" y1="510" x2="855" y2="510" stroke="#8b7fd4" stroke-width="4" opacity="0.6"/>

  <circle cx="940" cy="510" r="62" fill="#8b7fd4" opacity="0.28"/>
  <text x="940" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">3</text>
  <text x="940" y="620" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Hypothesize</text>
  <text x="940" y="656" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">Decide what you think</text>
  <text x="940" y="684" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">is happening</text>

  <line x1="1005" y1="510" x2="1175" y2="510" stroke="#8b7fd4" stroke-width="4" opacity="0.6"/>

  <circle cx="1260" cy="510" r="62" fill="#8b7fd4" opacity="0.28"/>
  <text x="1260" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">4</text>
  <text x="1260" y="620" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Validate</text>
  <text x="1260" y="656" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">Ask AI to confirm,</text>
  <text x="1260" y="684" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">challenge, or refine it</text>

  <line x1="1325" y1="510" x2="1495" y2="510" stroke="#8b7fd4" stroke-width="4" opacity="0.6"/>

  <circle cx="1580" cy="510" r="62" fill="#8b7fd4" opacity="0.28"/>
  <text x="1580" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">5</text>
  <text x="1580" y="620" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="600" fill="#ffffff">Act</text>
  <text x="1580" y="656" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">Implement the smallest</text>
  <text x="1580" y="684" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="300" fill="#c4baea">verified next step</text>

  <rect x="260" y="825" width="1400" height="122" rx="30" fill="#8b7fd4" opacity="0.16"/>
  <text x="960" y="874" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="31" font-weight="600" fill="#ffffff">Better debugging prompt</text>
  <text x="960" y="914" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="21" fill="#c4baea">"This config expires at 2700s. Silent renewal never fires.</text>
  <text x="960" y="940" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="21" fill="#c4baea">Most likely cause first, 3 bullets only."</text>
