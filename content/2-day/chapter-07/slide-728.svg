  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Interactive Quiz 21 — Answer</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4" rx="0"/>

  <rect x="80" y="190" width="1760" height="120" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="234" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">In the chapter 7 debugging workflow, what comes immediately</text>
  <text x="960" y="278" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">before asking AI to validate your idea?</text>

  <rect x="80" y="340" width="1760" height="150" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#8b7fd4" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="155" cy="415" r="40" fill="#8b7fd4" fill-opacity="0.2"/>
  <text x="155" y="428" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#8b7fd4">A</text>
  <text x="225" y="428" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#8b7fd4">Ask a colleague for the historical context behind the code first</text>

  <rect x="80" y="515" width="1760" height="150" rx="16" fill="#4ecb71" fill-opacity="0.12" stroke="#4ecb71" stroke-width="2"/>
  <circle cx="155" cy="590" r="40" fill="#4ecb71" fill-opacity="0.8"/>
  <text x="155" y="603" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">B</text>
  <text x="225" y="603" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="600" fill="#ffffff">Form your own hypothesis about what is happening</text>
  <text x="1800" y="603" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#4ecb71">✓</text>

  <rect x="80" y="690" width="1760" height="150" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#8b7fd4" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="155" cy="765" r="40" fill="#8b7fd4" fill-opacity="0.2"/>
  <text x="155" y="778" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#8b7fd4">C</text>
  <text x="225" y="778" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#8b7fd4">Rewrite the prompt until the model reaches the right answer alone</text>

  <rect x="80" y="865" width="1760" height="150" rx="16" fill="#ffffff" fill-opacity="0.05" stroke="#8b7fd4" stroke-opacity="0.4" stroke-width="1.5"/>
