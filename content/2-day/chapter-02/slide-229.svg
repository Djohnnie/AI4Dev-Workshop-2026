<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1490 54)" opacity="0.2">
    <text x="0" y="60"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="58" font-weight="700" fill="#c4baea">ULTIMATE</text>
    <text x="0" y="122"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="58" font-weight="700" fill="#c4baea">SNAKE</text>
  </g>

  <g transform="translate(1500 840)" opacity="0.18">
    <rect x="0" y="0" width="220" height="120" rx="18" fill="none" stroke="#c4baea" stroke-width="10"/>
    <line x1="36" y1="42" x2="184" y2="42" stroke="#c4baea" stroke-width="8" stroke-linecap="round"/>
    <circle cx="72" cy="80" r="12" fill="none" stroke="#c4baea" stroke-width="8"/>
    <circle cx="114" cy="80" r="12" fill="none" stroke="#c4baea" stroke-width="8"/>
    <circle cx="156" cy="80" r="12" fill="none" stroke="#c4baea" stroke-width="8"/>
  </g>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Lab 201 &#x2014; Ultimate Snake</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    Build a complete Snake game with ghost text, Ask mode, and inline chat only.
  </text>

  <rect x="80" y="235" width="980" height="740" rx="12"
    fill="#0f1226" fill-opacity="0.72" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="300"
    font-family="'Cascadia Mono', 'Consolas', monospace"
    font-size="30" font-weight="600" fill="#c4baea">Ultimate Snake</text>
  <text x="120" y="342"
    font-family="'Cascadia Mono', 'Consolas', monospace"
    font-size="22" font-weight="400" fill="#7fe38a">Score: 4    State: Running</text>
  <text x="120" y="376"
    font-family="'Cascadia Mono', 'Consolas', monospace"
    font-size="22" font-weight="400" fill="#c4baea">Game on. Grab the next snack.</text>

  <g font-family="'Cascadia Mono', 'Consolas', monospace" font-size="24" font-weight="600">
    <text x="120" y="438" fill="#9aa4d4"># # # # # # # # # # # # # # # # # # # # # # # # # #</text>
    <text x="120" y="476" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="514" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="552" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="590" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="628" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="666" fill="#9aa4d4"># . . . . . . . . . . . . . . . * . . . . . . . . #</text>
    <text x="120" y="704" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="742" fill="#9aa4d4"># . . . . . . . . . . . o o @ . . . . . . . . . . #</text>
    <text x="120" y="780" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="818" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="856" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="894" fill="#9aa4d4"># . . . . . . . . . . . . . . . . . . . . . . . . #</text>
    <text x="120" y="932" fill="#9aa4d4"># # # # # # # # # # # # # # # # # # # # # # # # # #</text>
  </g>

  <rect x="1110" y="235" width="730" height="240" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="318" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">1</text>
  <text x="1475" y="384" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Gameplay goal</text>
  <text x="1475" y="426" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Create a polished console Snake game with start, pause,</text>
  <text x="1475" y="460" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">score tracking, wrap-around movement, and self-collision.</text>

  <rect x="1110" y="495" width="730" height="230" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="572" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1475" y="634" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Copilot constraint</text>
  <text x="1475" y="672" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Participants may use Ask mode, inline chat, and</text>
  <text x="1475" y="706" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">ghost text only &#x2014; no Agent Mode or CLI.</text>

  <rect x="1110" y="745" width="730" height="230" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="820" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1475" y="884" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">What to ship</text>
  <text x="1475" y="924" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">A working game inside the starter app, not a big refactor</text>
  <text x="1475" y="956" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">or multi-file architecture exercise.</text>
