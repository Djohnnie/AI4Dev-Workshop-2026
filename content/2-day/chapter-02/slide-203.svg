<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4" rx="0"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Copilot Billing Is Changing</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4" rx="0"/>

  <!-- Overview -->
  <text x="80" y="205"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea" letter-spacing="1">
    Starting June 1, 2026, premium request units move to GitHub AI Credits.
  </text>

  <!-- Old model -->
  <rect x="100" y="300" width="760" height="520" rx="24"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="480" y="385" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="50" font-weight="700" fill="#ffffff">Request-based pricing</text>
  <rect x="330" y="415" width="300" height="3" fill="#8b7fd4"/>
  <circle cx="160" cy="505" r="7" fill="#8b7fd4"/>
  <text x="190" y="516" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Counts premium requests</text>
  <circle cx="160" cy="590" r="7" fill="#8b7fd4"/>
  <text x="190" y="601" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">One interaction can hide many tokens</text>
  <circle cx="160" cy="675" r="7" fill="#8b7fd4"/>
  <text x="190" y="686" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Quick chat and long agent work can</text>
  <text x="190" y="729" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">look too similar on the bill</text>

  <!-- Arrow -->
  <text x="960" y="575" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="78" font-weight="700" fill="#8b7fd4" opacity="0.8">&#x2192;</text>

  <!-- New model -->
  <rect x="1060" y="300" width="760" height="520" rx="24"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1440" y="385" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="50" font-weight="700" fill="#ffffff">AI Credit pricing</text>
  <rect x="1290" y="415" width="300" height="3" fill="#8b7fd4"/>
  <circle cx="1120" cy="505" r="7" fill="#8b7fd4"/>
  <text x="1150" y="516" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Counts token usage instead</text>
  <circle cx="1120" cy="590" r="7" fill="#8b7fd4"/>
  <text x="1150" y="601" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Input, output, and cached tokens</text>
  <circle cx="1120" cy="675" r="7" fill="#8b7fd4"/>
  <text x="1150" y="686" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Model choice and task size now</text>
  <text x="1150" y="729" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">map more directly to cost</text>

  <!-- Footer callout -->
  <rect x="340" y="885" width="1240" height="70" rx="35" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="930" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">1 GitHub AI Credit = $0.01 USD</text>
</svg>
