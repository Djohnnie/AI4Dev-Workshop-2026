<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>

  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4" rx="0"/>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Input Tokens vs Cached Tokens vs Output Tokens</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4" rx="0"/>

  <text x="80" y="205"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    AI Credit pricing counts different token types at different rates.
  </text>

  <rect x="90" y="280" width="550" height="470" rx="24"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="365" y="370" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" font-weight="700" fill="#ffffff">Input tokens</text>
  <rect x="245" y="400" width="240" height="3" fill="#8b7fd4"/>
  <text x="365" y="485" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="29" font-weight="300" fill="#c4baea">New content sent in this request:</text>
  <text x="140" y="565"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- latest user prompt</text>
  <text x="140" y="625"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- files and chat context</text>
  <text x="140" y="685"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- system and tool instructions</text>

  <rect x="685" y="280" width="550" height="470" rx="24"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="370" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" font-weight="700" fill="#ffffff">Cached tokens</text>
  <rect x="840" y="400" width="240" height="3" fill="#8b7fd4"/>
  <text x="960" y="485" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="29" font-weight="300" fill="#c4baea">Prompt tokens reused from earlier calls</text>
  <text x="735" y="565"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- same chat history</text>
  <text x="735" y="625"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- unchanged file context</text>
  <text x="735" y="685"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- often billed more cheaply</text>

  <rect x="1280" y="280" width="550" height="470" rx="24"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1555" y="370" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="44" font-weight="700" fill="#ffffff">Output tokens</text>
  <rect x="1435" y="400" width="240" height="3" fill="#8b7fd4"/>
  <text x="1555" y="485" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="29" font-weight="300" fill="#c4baea">What the model generates back:</text>
  <text x="1330" y="565"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- replies</text>
  <text x="1330" y="625"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- code or explanations</text>
  <text x="1330" y="685"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">- usually the priciest bucket</text>

  <rect x="180" y="835" width="1560" height="120" rx="26"
    fill="#8b7fd4" opacity="0.18"/>
  <text x="960" y="888" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="31" font-weight="700" fill="#ffffff">One Copilot interaction = prompt in → reused context → answer out</text>
  <text x="960" y="932" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea">That is why token-based billing is more precise than counting one request at a time.</text>
</svg>
