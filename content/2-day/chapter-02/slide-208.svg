<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#8b7fd4" letter-spacing="2">SECTION 1 OF 3 &#183; CODE COMPLETIONS</text>
  <text x="80" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Copilot Ghost-Text Suggestions</text>
  <rect x="0" y="200" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="265" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    The grey inline text is a suggestion preview. It is only inserted after you accept it.
  </text>

  <rect x="90" y="345" width="550" height="300" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="365" y="420" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">How it appears</text>
  <rect x="245" y="450" width="240" height="3" fill="#8b7fd4"/>
  <text x="140" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- appears while you type or pause</text>
  <text x="140" y="590" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- better after comments or clear names</text>

  <rect x="685" y="345" width="550" height="300" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="420" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">How to use it</text>
  <rect x="840" y="450" width="240" height="3" fill="#8b7fd4"/>
  <text x="735" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- Tab accepts the suggestion</text>
  <text x="735" y="590" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- Esc dismisses it</text>

  <rect x="1280" y="345" width="550" height="300" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1555" y="420" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">How to steer it</text>
  <rect x="1435" y="450" width="240" height="3" fill="#8b7fd4"/>
  <text x="1330" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- clear comments improve results</text>
  <text x="1330" y="590" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">- open relevant files for context</text>

  <rect x="165" y="715" width="1590" height="245" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>

  <text x="230" y="790" font-family="'Consolas', 'Courier New', monospace" font-size="30" font-weight="400" fill="#ffffff">function double(x) {</text>
  <text x="286" y="840" font-family="'Consolas', 'Courier New', monospace" font-size="30" font-weight="400" xml:space="preserve"><tspan fill="#ffffff">return </tspan><tspan fill="#b7afd8">x * 2;</tspan></text>
  <text x="230" y="890" font-family="'Consolas', 'Courier New', monospace" font-size="30" font-weight="400" fill="#ffffff">}</text>

  <rect x="1310" y="760" width="330" height="58" rx="29" fill="#8b7fd4" opacity="0.22"/>
  <text x="1475" y="798" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#ffffff">ghost text preview</text>

  <text x="960" y="1025" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#ffffff">Best practice: use ghost text to move faster, then review it like any other proposed code.</text>
</svg>
