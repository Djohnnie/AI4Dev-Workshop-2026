<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1500 58)" opacity="0.2">
    <text x="0" y="54"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="72" font-weight="700" fill="#c4baea">ASK</text>
    <text x="0" y="124"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="48" font-weight="600" fill="#c4baea">INLINE + GHOST TEXT</text>
  </g>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Lab 201 &#x2014; Expectations</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    This lab is about steering Copilot well, reviewing generated code, and finishing a playable game.
  </text>

  <rect x="80" y="245" width="860" height="350" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="314" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">1</text>
  <text x="510" y="368" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">Participant goal</text>
  <text x="160" y="422"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Keep the single-file starter intact and fill in the missing logic.</text>
  <text x="160" y="458"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Use prompts to build the loop, keyboard handling,</text>
  <text x="160" y="494"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  food spawning, wrap-around movement,</text>
  <text x="160" y="530"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  and self-collision rules.</text>

  <rect x="980" y="245" width="860" height="350" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="314" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1410" y="368" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">What good looks like</text>
  <text x="1060" y="422"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Space starts and pauses the game.</text>
  <text x="1060" y="458"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Arrow keys feel responsive and cannot reverse</text>
  <text x="1060" y="494"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  directly into the body.</text>
  <text x="1060" y="530"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• The snake grows, wraps at edges, and ends only</text>
  <text x="1060" y="566"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  on self-collision.</text>

  <rect x="80" y="615" width="860" height="360" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="694" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">3</text>
  <text x="510" y="748" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">How to use Copilot well</text>
  <text x="160" y="792"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Prompt one behavior at a time instead of asking</text>
  <text x="160" y="826"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  for the whole game at once.</text>
  <text x="160" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Review every suggestion before accepting it.</text>
  <text x="160" y="894"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Use inline chat to refine methods, then ghost text</text>
  <text x="160" y="928"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  to finish details quickly.</text>

  <rect x="980" y="615" width="860" height="360" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="694" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">4</text>
  <text x="1410" y="748" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">Facilitator expectation</text>
  <text x="1060" y="792"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• Participants should finish with a playable result,</text>
  <text x="1060" y="826"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  not perfect polish.</text>
  <text x="1060" y="860"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• The reference solution is there for comparison</text>
  <text x="1060" y="894"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">  after the attempt.</text>
  <text x="1060" y="928"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">• The learning outcome is prompt steering and review discipline.</text>
</svg>
