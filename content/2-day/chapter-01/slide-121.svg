<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b7fd4"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- Title -->
  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">RAG — Grounding an LLM</text>

  <!-- Title underline -->
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <!-- Subtitle -->
  <text x="960" y="208"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea" text-anchor="middle">Retrieval-Augmented Generation grounds a model with external knowledge</text>
  <text x="960" y="250"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea" text-anchor="middle">at runtime, so it answers from relevant evidence instead of memory alone.</text>

  <!-- Flow cards -->
  <rect x="90" y="300" width="420" height="420" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="300" y="380"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="54" fill="#8b7fd4" text-anchor="middle">📚</text>
  <text x="300" y="440"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">1. Retrieve Evidence</text>
  <rect x="175" y="468" width="250" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="300" y="526"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">Find the most relevant facts</text>
  <text x="300" y="562"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">from an external knowledge</text>
  <text x="300" y="598"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">source for this question.</text>

  <rect x="570" y="300" width="420" height="420" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="780" y="380"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="54" fill="#8b7fd4" text-anchor="middle">🪟</text>
  <text x="780" y="440"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">2. Ground the Prompt</text>
  <rect x="655" y="468" width="250" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="780" y="526"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">That evidence is inserted into</text>
  <text x="780" y="562"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">the prompt and context window</text>
  <text x="780" y="598"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">so the model is grounded.</text>

  <rect x="1050" y="300" width="420" height="420" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1260" y="380"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="54" fill="#8b7fd4" text-anchor="middle">✍️</text>
  <text x="1260" y="440"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">3. Generate</text>
  <rect x="1135" y="468" width="250" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="1260" y="526"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">The model answers using both</text>
  <text x="1260" y="562"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">its general training and the</text>
  <text x="1260" y="598"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea" text-anchor="middle">retrieved grounding context.</text>

  <rect x="1530" y="300" width="300" height="420" rx="18" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1680" y="380"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="54" fill="#8b7fd4" text-anchor="middle">⚠️</text>
  <text x="1680" y="440"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle">Still Limited</text>
  <rect x="1590" y="468" width="180" height="2" fill="#8b7fd4" fill-opacity="0.4"/>
  <text x="1680" y="526"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">RAG adds context at</text>
  <text x="1680" y="560"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">inference time; it does</text>
  <text x="1680" y="594"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">not retrain the model,</text>
  <text x="1680" y="628"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">fetch live state itself, or</text>
  <text x="1680" y="662"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="26" font-weight="300" fill="#c4baea" text-anchor="middle">perform external actions.</text>

  <!-- Connecting arrows -->
  <path d="M 510 510 L 570 510" stroke="#8b7fd4" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/>
  <path d="M 990 510 L 1050 510" stroke="#8b7fd4" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/>
  <path d="M 1470 510 L 1530 510" stroke="#8b7fd4" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/>

  <!-- Bottom bridge -->
  <rect x="140" y="800" width="1640" height="170" rx="18" fill="#ffffff" fill-opacity="0.06" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="858"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="700" fill="#8b7fd4" text-anchor="middle">RAG solves the grounding problem: give the LLM the right knowledge now.</text>
  <text x="960" y="908"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="30" font-weight="300" fill="#c4baea" text-anchor="middle">The next step is different: what if the model needs live data or must interact with the outside world?</text>
</svg>
