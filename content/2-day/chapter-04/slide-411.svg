<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">When Agent Mode Shines</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Reach for the agent when the goal is clear but the path is tedious - reach for Chat when you are still thinking.
  </text>

  <rect x="130" y="285" width="800" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="530" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Let the agent drive</text>
  <rect x="410" y="400" width="240" height="3" fill="#8b7fd4"/>
  <circle cx="195" cy="475" r="7" fill="#8b7fd4"/>
  <text x="225" y="486" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">repetitive cross-codebase changes</text>
  <circle cx="195" cy="545" r="7" fill="#8b7fd4"/>
  <text x="225" y="556" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">boilerplate that follows conventions</text>
  <circle cx="195" cy="615" r="7" fill="#8b7fd4"/>
  <text x="225" y="626" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">test - fix - rerun cycles</text>
  <circle cx="195" cy="685" r="7" fill="#8b7fd4"/>
  <text x="225" y="696" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">migrating a pattern everywhere</text>
  <circle cx="195" cy="755" r="7" fill="#8b7fd4"/>
  <text x="225" y="766" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">clear goal, tedious path</text>

  <rect x="990" y="285" width="800" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1390" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Stay manual</text>
  <rect x="1270" y="400" width="240" height="3" fill="#8b7fd4"/>
  <circle cx="1055" cy="475" r="7" fill="#8b7fd4"/>
  <text x="1085" y="486" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">exploratory work - you need to think</text>
  <circle cx="1055" cy="545" r="7" fill="#8b7fd4"/>
  <text x="1085" y="556" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">nuanced business-logic decisions</text>
  <circle cx="1055" cy="615" r="7" fill="#8b7fd4"/>
  <text x="1085" y="626" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">when you want to learn by doing</text>
  <circle cx="1055" cy="685" r="7" fill="#8b7fd4"/>
  <text x="1085" y="696" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">reasoning the problem through first</text>
  <circle cx="1055" cy="755" r="7" fill="#8b7fd4"/>
  <text x="1085" y="766" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">unclear or shifting requirements</text>

  <rect x="200" y="850" width="1520" height="105" rx="24" fill="#8b7fd4" opacity="0.18"/>
  <text x="960" y="895" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff">Hybrid is best: agent for scaffolding and boilerplate, manual for business logic and edge cases.</text>
  <text x="960" y="932" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">Struggling? If it loops 3-4 times on the same problem, step in with more specific guidance.</text>
</svg>
