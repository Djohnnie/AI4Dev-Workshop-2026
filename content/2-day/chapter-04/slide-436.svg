<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1450 60)" opacity="0.18">
    <text x="0" y="60"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="48" font-weight="700" fill="#c4baea">.github/prompts/</text>
    <text x="0" y="118"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="34" font-weight="600" fill="#c4baea">.github/skills/&lt;name&gt;/SKILL.md</text>
  </g>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Exercise 407 &#x2014; Experiment with Prompt Files and Skill Files</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="32" font-weight="300" fill="#c4baea">
    No starter app - use a tiny sandbox repo and compare what happens when you invoke the prompt versus when the agent loads the skill.
  </text>

  <rect x="90" y="260" width="560" height="310" rx="18"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="370" y="345" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">1</text>
  <text x="370" y="410" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">Create a prompt file</text>
  <rect x="290" y="428" width="160" height="3" fill="#8b7fd4"/>
  <text x="370" y="474" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">Add a reusable .prompt.md in</text>
  <text x="370" y="512" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">.github/prompts and invoke it yourself</text>

  <rect x="680" y="260" width="560" height="310" rx="18"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="345" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">2</text>
  <text x="960" y="410" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">Create a skill file</text>
  <rect x="880" y="428" width="160" height="3" fill="#8b7fd4"/>
  <text x="960" y="474" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">Add SKILL.md in .github/skills</text>
  <text x="960" y="512" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">and describe when the agent should use it</text>

  <rect x="1270" y="260" width="560" height="310" rx="18"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1550" y="345" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="52" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1550" y="410" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="600" fill="#ffffff">Compare behaviour</text>
  <rect x="1470" y="428" width="160" height="3" fill="#8b7fd4"/>
  <text x="1550" y="474" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">Notice the difference between</text>
  <text x="1550" y="512" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">manual invocation and auto-loading</text>

  <rect x="90" y="595" width="840" height="340" rx="20"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="680"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff">Experiment ideas</text>
  <rect x="130" y="700" width="180" height="3" fill="#8b7fd4"/>
  <text x="130" y="762"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">- encode the same task both ways and compare</text>
  <text x="130" y="800"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">- tighten the skill description and test trigger quality</text>
  <text x="130" y="838"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">- make one prompt file strict and another flexible</text>
  <text x="130" y="876"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">- try scaffolding, review, and test-writing examples</text>

  <rect x="980" y="595" width="850" height="340" rx="20"
    fill="#8b7fd4" fill-opacity="0.15" stroke="#8b7fd4" stroke-width="2"/>
  <text x="1020" y="680"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="36" font-weight="700" fill="#ffffff">The point of the exercise</text>
  <rect x="1020" y="700" width="230" height="3" fill="#8b7fd4"/>
  <text x="1020" y="762"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">Prompt files are for tasks you choose deliberately.</text>
  <text x="1020" y="800"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">Skill files are for processes the agent should reach for.</text>
  <text x="1020" y="838"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="27" font-weight="300" fill="#c4baea">This lab is about feeling that difference in practice.</text>
  <text x="1020" y="890"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="25" font-weight="300" fill="#8b7fd4">Small repo, quick loops, lots of comparison.</text>
  <text x="1020" y="922"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="25" font-weight="300" fill="#8b7fd4">Iterate on the files until Copilot behaves more predictably.</text>
</svg>
