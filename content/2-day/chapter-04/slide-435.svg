<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Prompt Files vs. Skill Files</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Same goal - reuse expertise. The difference is who decides to load it: you, or the agent.
  </text>

  <rect x="130" y="285" width="720" height="540" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="490" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Prompt file</text>
  <rect x="340" y="400" width="300" height="3" fill="#8b7fd4"/>
  <text x="490" y="460" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#8b7fd4">You invoke it</text>
  <circle cx="195" cy="535" r="7" fill="#8b7fd4"/>
  <text x="225" y="546" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">pick it from the Chat picker</text>
  <circle cx="195" cy="605" r="7" fill="#8b7fd4"/>
  <text x="225" y="616" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">a named task you run on demand</text>
  <circle cx="195" cy="675" r="7" fill="#8b7fd4"/>
  <text x="225" y="686" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">.github/prompts/*.prompt.md</text>
  <circle cx="195" cy="745" r="7" fill="#8b7fd4"/>
  <text x="225" y="756" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">e.g. "scaffold an endpoint"</text>

  <rect x="1070" y="285" width="720" height="540" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1430" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Skill file</text>
  <rect x="1280" y="400" width="300" height="3" fill="#8b7fd4"/>
  <text x="1430" y="460" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#8b7fd4">The agent reaches for it</text>
  <circle cx="1135" cy="535" r="7" fill="#8b7fd4"/>
  <text x="1165" y="546" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">it reads each description, decides</text>
  <circle cx="1135" cy="605" r="7" fill="#8b7fd4"/>
  <text x="1165" y="616" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">an expert process for a work type</text>
  <circle cx="1135" cy="675" r="7" fill="#8b7fd4"/>
  <text x="1165" y="686" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">.github/skills/&lt;name&gt;/SKILL.md</text>
  <circle cx="1135" cy="745" r="7" fill="#8b7fd4"/>
  <text x="1165" y="756" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">can bundle runnable scripts</text>

  <rect x="200" y="855" width="1520" height="105" rx="24" fill="#8b7fd4" opacity="0.18"/>
  <text x="960" y="900" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff">Prompt file = a reusable prompt you invoke deliberately. Skill file = an expert process the agent applies on its own.</text>
  <text x="960" y="937" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">SKILL.md follows the open agentskills spec - compatible with Copilot, Claude, and other agents.</text>
</svg>
