  <text x="1475" y="694" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">multiple files but still has a clear, reviewable end result.</text>

  <rect x="1110" y="745" width="730" height="230" rx="12"
