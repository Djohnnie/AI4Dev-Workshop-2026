<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1535 56)" opacity="0.2">
    <text x="0" y="62"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="58" font-weight="700" fill="#c4baea">Plan Mode</text>
    <text x="0" y="126"
      font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
      font-size="38" font-weight="600" fill="#c4baea">design before you build</text>
  </g>

  <g transform="translate(1490 832)" opacity="0.18">
    <rect x="0" y="0" width="240" height="120" rx="18" fill="none" stroke="#c4baea" stroke-width="10"/>
    <line x1="36" y1="42" x2="198" y2="42" stroke="#c4baea" stroke-width="8" stroke-linecap="round"/>
    <line x1="36" y1="76" x2="126" y2="76" stroke="#c4baea" stroke-width="8" stroke-linecap="round"/>
    <circle cx="168" cy="76" r="14" fill="none" stroke="#c4baea" stroke-width="8"/>
  </g>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Exercise 403 &#x2014; Paginate, Filter and Sort</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    Use Plan Mode to design and implement query parameters for the GET /tasks endpoint.
  </text>

  <rect x="80" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">01</text>
  <text x="510" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Start</text>
  <rect x="430" y="420" width="160" height="3" fill="#8b7fd4"/>
  <text x="510" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Run the app and add a few tasks</text>
  <text x="510" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">to have data to work with</text>

  <rect x="980" y="235" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="325" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">02</text>
  <text x="1410" y="400" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Plan</text>
  <rect x="1330" y="420" width="160" height="3" fill="#8b7fd4"/>
  <text x="1410" y="466" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Switch to Plan Mode and describe</text>
  <text x="1410" y="510" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">pagination, filtering and sorting</text>

  <rect x="80" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">03</text>
  <text x="510" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Review</text>
  <rect x="430" y="817" width="160" height="3" fill="#8b7fd4"/>
  <text x="510" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Read every step of the plan</text>
  <text x="510" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">before approving execution</text>

  <rect x="980" y="632" width="860" height="367" rx="12"
    fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="722" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="56" font-weight="700" fill="#8b7fd4">04</text>
  <text x="1410" y="797" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="38" font-weight="600" fill="#ffffff">Execute</text>
  <rect x="1330" y="817" width="160" height="3" fill="#8b7fd4"/>
  <text x="1410" y="863" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">Approve the plan and verify</text>
  <text x="1410" y="907" text-anchor="middle"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="28" font-weight="300" fill="#c4baea">the new query parameters work</text>
</svg>
