<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <!-- play / demo glyph -->
  <g transform="translate(1610 70)" opacity="0.22">
    <circle cx="120" cy="120" r="96" fill="none" stroke="#c4baea" stroke-width="10"/>
    <path d="M95 75 L170 120 L95 165 Z" fill="#c4baea"/>
  </g>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#8b7fd4" letter-spacing="3">LIVE DEMO</text>
  <text x="80" y="190" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#ffffff" letter-spacing="-1">Design a New Feature with Plan Mode</text>
  <rect x="0" y="222" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="290" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    A new REST endpoint with filtering, sorting, validation, and integration tests — planned before a file is touched.
  </text>

  <rect x="90" y="335" width="1740" height="110" rx="16" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="404" font-family="'Consolas', 'Courier New', monospace" font-size="32" font-weight="400" fill="#c4baea">&gt; Add a paginated product search endpoint with filters, sorting, and full integration tests.</text>

  <text x="80" y="535" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Narrate each Plan Mode stage as it unfolds</text>
  <rect x="80" y="555" width="380" height="3" fill="#8b7fd4"/>

  <circle cx="105" cy="615" r="7" fill="#8b7fd4"/>
  <text x="135" y="626" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">Show the clarifying questions appearing — answer scope, library, and test-framework choices live</text>
  <circle cx="105" cy="680" r="7" fill="#8b7fd4"/>
  <text x="135" y="691" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">Read the generated blueprint together — point out a pitfall Copilot already caught</text>
  <circle cx="105" cy="745" r="7" fill="#8b7fd4"/>
  <text x="135" y="756" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">Revise one step live to show the review loop — then approve the final plan</text>
  <circle cx="105" cy="810" r="7" fill="#8b7fd4"/>
  <text x="135" y="821" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">Hand off to Agent Mode — watch it implement exactly what was planned, step by step</text>

  <rect x="90" y="880" width="1740" height="80" rx="16" fill="#8b7fd4" opacity="0.18"/>
  <text x="960" y="928" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="600" fill="#ffffff">~6-8 minutes. Pre-run to lock down the question flow — and keep a recording as backup.</text>
</svg>
