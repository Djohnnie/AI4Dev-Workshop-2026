<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1">Step 1 &amp; 2 — From Questions to Blueprint</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Copilot first clarifies what you need, then maps out how to build it — all in plain language.
  </text>

  <!-- Vertical divider -->
  <line x1="960" y1="248" x2="960" y2="990" stroke="#8b7fd4" stroke-width="1.5" opacity="0.4"/>

  <!-- Left panel: Step 1 — Clarifying Questions -->
  <text x="120" y="285" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#8b7fd4" letter-spacing="3">STEP 1</text>
  <text x="120" y="345" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Clarifying Questions</text>
  <rect x="120" y="365" width="280" height="3" fill="#8b7fd4"/>

  <circle cx="148" cy="433" r="7" fill="#8b7fd4"/>
  <text x="178" y="444" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Copilot reads your high-level goal</text>
  <circle cx="148" cy="498" r="7" fill="#8b7fd4"/>
  <text x="178" y="509" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Scans your existing codebase for context</text>
  <circle cx="148" cy="563" r="7" fill="#8b7fd4"/>
  <text x="178" y="574" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Asks targeted questions about scope,</text>
  <text x="178" y="610" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">libraries, and design decisions</text>
  <circle cx="148" cy="663" r="7" fill="#8b7fd4"/>
  <text x="178" y="674" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">You answer — scope is locked before</text>
  <text x="178" y="710" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Copilot generates anything</text>

  <rect x="120" y="800" width="760" height="70" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#8b7fd4" stroke-width="1"/>
  <text x="500" y="843" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#c4baea">No more "that's not what I meant" moments.</text>

  <!-- Right panel: Step 2 — Step-by-Step Blueprint -->
  <text x="1000" y="285" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#8b7fd4" letter-spacing="3">STEP 2</text>
  <text x="1000" y="345" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">Step-by-Step Blueprint</text>
  <rect x="1000" y="365" width="280" height="3" fill="#8b7fd4"/>

  <circle cx="1028" cy="433" r="7" fill="#8b7fd4"/>
  <text x="1058" y="444" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Generates a structured list of actionable steps</text>
  <circle cx="1028" cy="498" r="7" fill="#8b7fd4"/>
  <text x="1058" y="509" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Highlights potential pitfalls upfront</text>
  <circle cx="1028" cy="563" r="7" fill="#8b7fd4"/>
  <text x="1058" y="574" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Proposes a logic flow in plain language</text>
  <circle cx="1028" cy="628" r="7" fill="#8b7fd4"/>
  <text x="1058" y="639" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Sub-tasks with clear dependencies</text>
  <circle cx="1028" cy="693" r="7" fill="#8b7fd4"/>
  <text x="1058" y="704" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">Everything visible and editable before</text>
  <text x="1058" y="740" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">execution starts</text>

  <rect x="1000" y="800" width="800" height="70" rx="16" fill="#ffffff" fill-opacity="0.08" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1400" y="843" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="400" fill="#c4baea">The blueprint is editable — this is not a one-way output.</text>
</svg>
