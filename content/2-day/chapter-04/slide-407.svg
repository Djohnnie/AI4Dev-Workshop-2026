<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">What "Autonomous" Really Means</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Agent Mode replaces 10-20 manual steps - but it is not running unsupervised.
  </text>

  <rect x="130" y="295" width="800" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="530" y="380" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">It can</text>
  <rect x="410" y="410" width="240" height="3" fill="#8b7fd4"/>
  <circle cx="195" cy="490" r="7" fill="#8b7fd4"/>
  <text x="225" y="501" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">find the files that matter on its own</text>
  <circle cx="195" cy="565" r="7" fill="#8b7fd4"/>
  <text x="225" y="576" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">make consistent edits across many</text>
  <circle cx="195" cy="640" r="7" fill="#8b7fd4"/>
  <text x="225" y="651" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">run tests and read the results</text>
  <circle cx="195" cy="715" r="7" fill="#8b7fd4"/>
  <text x="225" y="726" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">fix its own failures and continue</text>

  <rect x="990" y="295" width="800" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1390" y="380" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">It will not</text>
  <rect x="1270" y="410" width="240" height="3" fill="#8b7fd4"/>
  <circle cx="1055" cy="490" r="7" fill="#8b7fd4"/>
  <text x="1085" y="501" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">run terminal commands without asking</text>
  <circle cx="1055" cy="565" r="7" fill="#8b7fd4"/>
  <text x="1085" y="576" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">hide what it intends to do</text>
  <circle cx="1055" cy="640" r="7" fill="#8b7fd4"/>
  <text x="1085" y="651" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">write to disk before you accept</text>
  <circle cx="1055" cy="715" r="7" fill="#8b7fd4"/>
  <text x="1085" y="726" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#c4baea">act outside your decision points</text>

  <rect x="330" y="865" width="1260" height="90" rx="45" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="908" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">Think of it as a capable contractor: reads the brief, does the work,</text>
  <text x="960" y="940" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">and sends you a summary to approve.</text>
</svg>
