<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1450 58)" opacity="0.2">
    <text x="0" y="54" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="#c4baea">COPILOT</text>
    <text x="0" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="#c4baea">CLI</text>
  </g>

  <text x="80" y="108"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Lab 402 &#x2014; Ultimate Snake with Copilot CLI</text>

  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="195"
    font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="34" font-weight="300" fill="#c4baea">
    Build the same web game from an empty folder, but drive the workflow from the terminal with GitHub Copilot CLI.
  </text>

  <rect x="80" y="245" width="980" height="720" rx="12"
    fill="#0f1226" fill-opacity="0.72" stroke="#8b7fd4" stroke-width="1.5"/>

  <text x="120" y="300" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Suggested CLI flow</text>
  <text x="120" y="352" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">1. Ask Copilot CLI what command should create the starter project.</text>
  <text x="120" y="394" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">2. Use it again to suggest the next commands for build, run, and file setup.</text>
  <text x="120" y="436" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">3. Let Copilot CLI explain commands or errors before you continue.</text>
  <text x="120" y="516" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">What participants should practice</text>
  <text x="120" y="568" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">• Creating the app, adding files, and editing code from the terminal.</text>
  <text x="120" y="606" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">• Iterating with Copilot CLI prompts instead of switching tools.</text>
  <text x="120" y="644" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">• Inspecting output after each step and deciding the next prompt.</text>

  <rect x="120" y="690" width="900" height="230" rx="18" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="748" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">CLI-only workflow</text>
  <text x="160" y="798" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Use GitHub Copilot CLI, and only the CLI, to create the project,</text>
  <text x="160" y="836" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">run commands, build the app, and add or edit the code</text>
  <text x="160" y="874" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">from the terminal.</text>

  <rect x="1110" y="245" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="306" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700" fill="#8b7fd4">1</text>
  <text x="1475" y="366" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Start from nothing</text>
  <text x="1475" y="410" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">The lab folder is intentionally empty</text>
  <text x="1475" y="446" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">except for the README.</text>

  <rect x="1110" y="495" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="556" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1475" y="616" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Use Copilot CLI on purpose</text>
  <text x="1475" y="660" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Suggest commands, explain unknown ones,</text>
  <text x="1475" y="696" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">then run them yourself.</text>

  <rect x="1110" y="745" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="806" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="50" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1475" y="866" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Expected outcome</text>
  <text x="1475" y="910" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">End with the same playable Ultimate</text>
  <text x="1475" y="946" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Snake web app as Lab 401.</text>
</svg>
