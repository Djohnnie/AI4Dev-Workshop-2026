<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#8b7fd4" letter-spacing="2">SECTION 3 OF 6 &#183; COPILOT CLI</text>
  <text x="80" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Installing GitHub Copilot CLI</text>
  <rect x="0" y="200" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="265" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    A standalone CLI — install once, authenticate once, works in any terminal.
  </text>

  <!-- Left card: Prerequisites -->
  <rect x="90" y="350" width="850" height="290" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="425" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Prerequisites</text>
  <rect x="130" y="445" width="200" height="3" fill="#8b7fd4"/>
  <circle cx="153" cy="493" r="6" fill="#8b7fd4"/>
  <text x="175" y="502" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Active GitHub Copilot subscription</text>
  <circle cx="153" cy="541" r="6" fill="#8b7fd4"/>
  <text x="175" y="550" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Windows: PowerShell v6 or higher</text>
  <circle cx="153" cy="589" r="6" fill="#8b7fd4"/>
  <text x="175" y="598" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">npm method: Node.js 22 or later</text>

  <!-- Right card: Install -->
  <rect x="980" y="350" width="850" height="290" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1020" y="425" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Install — pick one</text>
  <rect x="1020" y="445" width="200" height="3" fill="#8b7fd4"/>
  <rect x="1020" y="462" width="760" height="155" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1045" y="502" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">Windows    winget install GitHub.Copilot</text>
  <text x="1045" y="540" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">macOS      brew install copilot-cli</text>
  <text x="1045" y="578" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">npm (all)  npm install -g @github/copilot</text>

  <!-- Bottom card: Authenticate & update -->
  <rect x="90" y="675" width="1740" height="220" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="745" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">Authenticate &amp; keep current</text>
  <rect x="130" y="765" width="200" height="3" fill="#8b7fd4"/>
  <rect x="130" y="790" width="200" height="50" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="155" y="824" font-family="'Consolas', 'Courier New', monospace" font-size="26" fill="#c4baea">/login</text>
  <text x="360" y="820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">First launch prompts for /login — your GitHub account is the key, no separate token.</text>
  <text x="360" y="860" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Update: winget upgrade GitHub.Copilot &#183; brew upgrade copilot-cli &#183; npm update -g @github/copilot</text>

  <rect x="430" y="940" width="1060" height="70" rx="35" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="985" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff" letter-spacing="1">Admins can restrict access from the organisation&#x2019;s GitHub Copilot settings.</text>
</svg>
