<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Two Commands: suggest &amp; explain</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Get a command from plain English - or understand a command someone else wrote.
  </text>

  <rect x="90" y="290" width="850" height="560" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="365" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">suggest</text>
  <rect x="130" y="385" width="220" height="3" fill="#8b7fd4"/>
  <rect x="130" y="410" width="770" height="55" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="152" y="447" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#c4baea">gh copilot suggest "find files changed in 7 days"</text>
  <circle cx="150" cy="525" r="6" fill="#8b7fd4"/>
  <text x="180" y="536" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">shows a command, then offers:</text>
  <text x="180" y="585" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">copy &#183; explain &#183; revise</text>
  <circle cx="150" cy="640" r="6" fill="#8b7fd4"/>
  <text x="180" y="651" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">revise without retyping:</text>
  <text x="180" y="700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">"make it recursive", "exclude node_modules"</text>
  <circle cx="150" cy="755" r="6" fill="#8b7fd4"/>
  <text x="180" y="766" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">target a type: -t shell | -t git | -t gh</text>

  <rect x="980" y="290" width="850" height="560" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1020" y="365" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">explain</text>
  <rect x="1020" y="385" width="220" height="3" fill="#8b7fd4"/>
  <rect x="1020" y="410" width="770" height="55" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1042" y="447" font-family="'Consolas', 'Courier New', monospace" font-size="22" fill="#c4baea">gh copilot explain "tar -czf a.tgz --exclude=*.log"</text>
  <circle cx="1040" cy="525" r="6" fill="#8b7fd4"/>
  <text x="1070" y="536" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">plain-English breakdown of every</text>
  <text x="1070" y="585" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">flag and argument</text>
  <circle cx="1040" cy="640" r="6" fill="#8b7fd4"/>
  <text x="1070" y="651" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">decode inherited CI scripts,</text>
  <text x="1070" y="700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">Dockerfiles, git rebase sequences</text>
  <circle cx="1040" cy="755" r="6" fill="#8b7fd4"/>
  <text x="1070" y="766" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="300" fill="#c4baea">paste multi-line scripts, not just one-liners</text>

  <rect x="430" y="885" width="1060" height="65" rx="32" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="927" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff" letter-spacing="1">suggest to get it - explain to understand it.</text>
</svg>
