<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#8b7fd4" letter-spacing="2">SECTION 6 OF 7 &#183; PROMPT FILES &amp; SKILL FILES</text>
  <text x="80" y="170" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Anatomy of a Prompt File</text>
  <rect x="0" y="200" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="265" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    A .prompt.md in .github/prompts/ - a great one-off prompt, captured and version-controlled forever.
  </text>

  <rect x="90" y="345" width="1000" height="620" rx="20" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="405" font-family="'Consolas', 'Courier New', monospace" font-size="28" fill="#6a5fb8">.github/prompts/create-rest-endpoint.prompt.md</text>
  <rect x="120" y="425" width="940" height="2" fill="#8b7fd4" opacity="0.4"/>
  <text x="120" y="485" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#8b7fd4">---</text>
  <text x="120" y="530" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">title: Create REST Endpoint</text>
  <text x="120" y="575" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">description: Scaffold a CRUD endpoint</text>
  <text x="120" y="620" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">mode: agent</text>
  <text x="120" y="665" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#8b7fd4">---</text>
  <text x="120" y="725" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#ffffff">Create a REST endpoint for</text>
  <text x="120" y="768" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#ffffff">${input:resourceName} following the</text>
  <text x="120" y="811" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#ffffff">patterns in #file:src/routes/users.ts.</text>
  <text x="120" y="854" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#ffffff">Use AppError for errors and write</text>
  <text x="120" y="897" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#ffffff">Vitest tests for happy + error paths.</text>

  <rect x="1130" y="345" width="700" height="620" rx="20" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1170" y="410" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">The parts</text>
  <rect x="1170" y="430" width="200" height="3" fill="#8b7fd4"/>
  <text x="1170" y="495" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#8b7fd4">title</text>
  <text x="1170" y="532" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">shown in the VS Code picker</text>
  <text x="1170" y="595" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#8b7fd4">mode</text>
  <text x="1170" y="632" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">ask &#183; edit &#183; agent</text>
  <text x="1170" y="695" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#8b7fd4">${input:...}</text>
  <text x="1170" y="732" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">prompts for a value at run time</text>
  <text x="1170" y="795" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="700" fill="#8b7fd4">#file:...</text>
  <text x="1170" y="832" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">attaches context every time</text>
  <text x="1170" y="898" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">Invoke with # in Chat - a</text>
  <text x="1170" y="932" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">30-min task becomes 90 seconds.</text>
</svg>
