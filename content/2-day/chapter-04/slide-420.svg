<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Installing gh copilot</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    It's an extension to the GitHub CLI - and it reuses the auth you already have.
  </text>

  <rect x="90" y="290" width="850" height="290" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="365" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">1 - Prerequisite</text>
  <rect x="130" y="385" width="200" height="3" fill="#8b7fd4"/>
  <text x="130" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Install the GitHub CLI from</text>
  <text x="130" y="482" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">cli.github.com, then sign in:</text>
  <rect x="130" y="510" width="680" height="50" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="155" y="544" font-family="'Consolas', 'Courier New', monospace" font-size="26" fill="#c4baea">gh auth login</text>

  <rect x="980" y="290" width="850" height="290" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1020" y="365" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">2 - Install the extension</text>
  <rect x="1020" y="385" width="200" height="3" fill="#8b7fd4"/>
  <text x="1020" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Under 10 seconds:</text>
  <rect x="1020" y="475" width="760" height="50" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="1045" y="509" font-family="'Consolas', 'Courier New', monospace" font-size="26" fill="#c4baea">gh extension install github/gh-copilot</text>

  <rect x="90" y="615" width="1740" height="220" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="685" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">3 - Verify &amp; keep current</text>
  <rect x="130" y="705" width="200" height="3" fill="#8b7fd4"/>
  <rect x="130" y="730" width="500" height="50" rx="10" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1"/>
  <text x="155" y="764" font-family="'Consolas', 'Courier New', monospace" font-size="26" fill="#c4baea">gh copilot --help</text>
  <text x="680" y="752" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">shows the subcommands. No separate key -</text>
  <text x="680" y="790" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">if you're signed into gh, you're signed into Copilot. Update often with gh extension upgrade --all.</text>

  <rect x="430" y="880" width="1060" height="70" rx="35" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="925" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff" letter-spacing="1">Windows: works in PowerShell, Command Prompt, and Windows Terminal.</text>
</svg>
