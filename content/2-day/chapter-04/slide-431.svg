<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <g transform="translate(1610 70)" opacity="0.22">
    <circle cx="120" cy="120" r="96" fill="none" stroke="#c4baea" stroke-width="10"/>
    <path d="M95 75 L170 120 L95 165 Z" fill="#c4baea"/>
  </g>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#8b7fd4" letter-spacing="3">LIVE DEMO</text>
  <text x="80" y="190" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1">Find Every TODO in One Line</text>
  <rect x="0" y="222" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="290" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    A realistic task everyone relates to - ask, then explain the result.
  </text>

  <text x="80" y="375" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">1 - Ask</text>
  <rect x="90" y="395" width="1740" height="90" rx="16" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="450" font-family="'Consolas', 'Courier New', monospace" font-size="28" fill="#c4baea">&gt; gh copilot suggest "find all TODO comments in TypeScript files, show file and line"</text>

  <text x="80" y="555" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">2 - Expected output (either is correct)</text>
  <rect x="90" y="575" width="1740" height="150" rx="16" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="635" font-family="'Consolas', 'Courier New', monospace" font-size="28" fill="#c4baea">grep -rn "TODO" --include="*.ts" .</text>
  <text x="120" y="695" font-family="'Consolas', 'Courier New', monospace" font-size="28" fill="#c4baea">find . -name "*.ts" -exec grep -Hn "TODO" {} \;</text>

  <text x="80" y="790" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">3 - Run it &amp; explain it</text>
  <rect x="90" y="810" width="1740" height="80" rx="16" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="858" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Run against the workshop repo for real output, then pipe the command to explain to close the loop.</text>

  <rect x="430" y="915" width="1060" height="55" rx="27" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="952" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="600" fill="#ffffff" letter-spacing="1">Pre-seed a few TODOs so the output is concrete and satisfying.</text>
</svg>
