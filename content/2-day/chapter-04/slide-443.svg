<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="100" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#8b7fd4" letter-spacing="2">BONUS: COPILOT SDK &#183; SUB-AGENT ORCHESTRATION</text>
  <text x="80" y="165" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Orchestrating Custom Agents</text>
  <text x="80" y="230" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">with GitHub Copilot SDK</text>
  <rect x="0" y="255" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="315" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea" letter-spacing="1">In an app, you can attach custom agents to one Copilot session and let the runtime</text>
  <text x="80" y="353" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea" letter-spacing="1">delegate work to the right specialist automatically.</text>

  <rect x="90" y="390" width="790" height="555" rx="22" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="125" y="450" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#8b7fd4">createSession({</text>
  <text x="125" y="490" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">  model: "gpt-4.1",</text>
  <text x="125" y="530" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">  customAgents: [</text>
  <text x="125" y="570" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#ffffff">    { name: "researcher",</text>
  <text x="125" y="608" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#ffffff">      tools: ["grep", "glob", "view"], ... },</text>
  <text x="125" y="648" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#ffffff">    { name: "editor",</text>
  <text x="125" y="686" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#ffffff">      tools: ["view", "edit", "bash"], ... }</text>
  <text x="125" y="726" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">  ],</text>
  <text x="125" y="766" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#c4baea">  onPermissionRequest: approveOnce</text>
  <text x="125" y="806" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#8b7fd4">})</text>

  <rect x="125" y="820" width="720" height="95" rx="20" fill="#ffffff" fill-opacity="0.06"/>
  <text x="160" y="856" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Each custom agent carries its own:</text>
  <text x="160" y="885" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#c4baea">prompt • tool restrictions • optional MCP servers</text>
  <text x="160" y="910" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#c4baea">optional preloaded skills</text>

  <rect x="920" y="390" width="830" height="170" rx="22" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">How the runtime thinks</text>
  <rect x="960" y="463" width="230" height="3" fill="#8b7fd4"/>
  <text x="960" y="506" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="300" fill="#c4baea">1. Read the user's goal</text>
  <text x="960" y="532" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="300" fill="#c4baea">2. Infer which custom agent best</text>
  <text x="960" y="558" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="300" fill="#c4baea">matches the intent</text>

  <rect x="920" y="580" width="830" height="205" rx="22" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="960" y="635" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">What happens next</text>
  <rect x="960" y="653" width="200" height="3" fill="#8b7fd4"/>
  <text x="960" y="697" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">3. Spawn that agent as a sub-agent</text>
  <text x="960" y="724" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">in an isolated context</text>
  <text x="960" y="752" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">4. Stream lifecycle events back to</text>
  <text x="960" y="779" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">the parent session</text>

  <rect x="920" y="805" width="830" height="140" rx="22" fill="#8b7fd4" fill-opacity="0.15" stroke="#8b7fd4" stroke-width="2"/>
  <text x="960" y="852" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Why it matters</text>
  <rect x="960" y="868" width="165" height="3" fill="#8b7fd4"/>
  <text x="960" y="895" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#c4baea">You keep the parent session clean</text>
  <text x="960" y="919" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#c4baea">while specialists work in isolated contexts.</text>
  <text x="960" y="943" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="300" fill="#c4baea">That makes custom agents orchestration blocks.</text>
</svg>
