<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="#ffffff" letter-spacing="-1">Prompt Patterns for the Analysis Phase</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">The best prompts ask for structure, trade-offs, and unanswered questions - not just solutions.</text>

  <rect x="120" y="270" width="780" height="540" rx="26" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="510" y="338" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">Starting From Scratch</text>
  <rect x="180" y="355" width="250" height="3" fill="#8b7fd4"/>
  <rect x="180" y="395" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="210" y="435" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Turn this idea into user stories, acceptance</text>
  <text x="210" y="467" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">criteria, risks, and open questions."</text>
  <rect x="180" y="520" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="210" y="560" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Compare two architecture approaches and explain</text>
  <text x="210" y="592" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">the trade-offs for a small engineering team."</text>
  <rect x="180" y="645" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="210" y="685" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Draft an API outline and data model from these</text>
  <text x="210" y="717" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">requirements before implementation starts."</text>

  <rect x="1020" y="270" width="780" height="540" rx="26" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1410" y="338" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">Working With Existing Code</text>
  <rect x="1080" y="355" width="280" height="3" fill="#8b7fd4"/>
  <rect x="1080" y="395" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="1110" y="435" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Explain the repository, major modules, and data</text>
  <text x="1110" y="467" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">flow like I am a new team member."</text>
  <rect x="1080" y="520" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="1110" y="560" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"What is risky to change here? Show likely</text>
  <text x="1110" y="592" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">hotspots, tight coupling, and missing tests."</text>
  <rect x="1080" y="645" width="640" height="92" rx="18" fill="#8b7fd4" opacity="0.14"/>
  <text x="1110" y="685" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Outline the safest migration path for feature X</text>
  <text x="1110" y="717" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">and list the questions we still need to answer."</text>

  <rect x="200" y="905" width="1520" height="68" rx="34" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="948" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">Ask for trade-offs, evidence, and open questions - that is where analysis value comes from.</text>
</svg>
