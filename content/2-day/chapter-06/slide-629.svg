<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="54" font-weight="700" fill="#ffffff" letter-spacing="-1">Exceptions and Stack Traces - Start with the Real Failure</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">The fastest debugging prompt usually starts with the exact exception, the first meaningful frame in your code, and what the app was trying to do.</text>

  <rect x="100" y="300" width="650" height="540" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="425" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">What to Pull Out</text>
  <rect x="275" y="387" width="300" height="3" fill="#8b7fd4"/>
  <circle cx="182" cy="455" r="7" fill="#8b7fd4"/>
  <text x="210" y="466" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">exception type and message</text>
  <circle cx="182" cy="530" r="7" fill="#8b7fd4"/>
  <text x="210" y="541" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">first application frame in the stack trace</text>
  <circle cx="182" cy="605" r="7" fill="#8b7fd4"/>
  <text x="210" y="616" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">inputs, request, or user action that triggered it</text>
  <circle cx="182" cy="680" r="7" fill="#8b7fd4"/>
  <text x="210" y="691" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">expected behaviour versus what really happened</text>

  <rect x="820" y="300" width="1010" height="540" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1325" y="370" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="40" font-weight="700" fill="#ffffff">Prompt Pattern</text>
  <rect x="1195" y="387" width="260" height="3" fill="#8b7fd4"/>
  <rect x="900" y="445" width="850" height="235" rx="20" fill="#8b7fd4" opacity="0.14"/>
  <text x="935" y="490" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">"Here is the exception, stack trace, and the method on the first</text>
  <text x="935" y="525" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">application frame. Explain the likely root cause, what assumption</text>
  <text x="935" y="560" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">failed, and what data I should inspect next. Then suggest the</text>
  <text x="935" y="595" font-family="'Consolas', 'Courier New', monospace" font-size="23" fill="#ffffff">smallest safe fix or experiment to confirm the hypothesis."</text>
  <text x="1325" y="740" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Ask "what assumption failed?" and the debugging conversation gets sharper fast.</text>

  <rect x="300" y="900" width="1320" height="68" rx="34" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="943" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">Do not paraphrase the failure if you can paste the real evidence.</text>
</svg>
