<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" fill="#ffffff" letter-spacing="-1">From Ticket to Working Set</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">Better feature work starts with better inputs: give Copilot the artifact, the constraints, and the existing pattern.</text>

  <rect x="120" y="285" width="760" height="520" rx="26" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="500" y="355" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Good Starting Artifacts</text>
  <rect x="255" y="372" width="260" height="3" fill="#8b7fd4"/>
  <circle cx="192" cy="435" r="7" fill="#8b7fd4"/>
  <text x="220" y="446" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">User story, issue, or acceptance criteria</text>
  <circle cx="192" cy="510" r="7" fill="#8b7fd4"/>
  <text x="220" y="521" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">API contract, schema, or UI mock-up</text>
  <circle cx="192" cy="585" r="7" fill="#8b7fd4"/>
  <text x="220" y="596" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Existing service, controller, or test file</text>
  <circle cx="192" cy="660" r="7" fill="#8b7fd4"/>
  <text x="220" y="671" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">A failing test or a precise TODO comment</text>

  <rect x="1040" y="285" width="760" height="520" rx="26" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1420" y="355" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Ask Copilot First</text>
  <rect x="1260" y="372" width="220" height="3" fill="#8b7fd4"/>
  <circle cx="1112" cy="435" r="7" fill="#8b7fd4"/>
  <text x="1140" y="446" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Which files are likely involved?</text>
  <circle cx="1112" cy="510" r="7" fill="#8b7fd4"/>
  <text x="1140" y="521" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">What assumptions or gaps are hidden here?</text>
  <circle cx="1112" cy="585" r="7" fill="#8b7fd4"/>
  <text x="1140" y="596" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">What is the smallest useful vertical slice?</text>
  <circle cx="1112" cy="660" r="7" fill="#8b7fd4"/>
  <text x="1140" y="671" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Which existing pattern should the code follow?</text>

  <rect x="410" y="885" width="1100" height="68" rx="34" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="928" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="#ffffff" letter-spacing="1">The better the starting artifact, the less generic the generated code.</text>
</svg>
