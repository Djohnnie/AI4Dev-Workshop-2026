<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Test-First Prompting</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Describe the test, then let Copilot write the implementation - the test constrains the solution space.
  </text>

  <rect x="90" y="295" width="850" height="430" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">A - Test from spec</text>
  <rect x="130" y="390" width="200" height="3" fill="#8b7fd4"/>
  <text x="130" y="450" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Describe behaviour as "should"</text>
  <text x="130" y="490" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">statements - ask Copilot to write</text>
  <text x="130" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">the tests, then the implementation.</text>
  <text x="130" y="600" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">"should return null for empty input,</text>
  <text x="130" y="632" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">throw ValidationError without @,</text>
  <text x="130" y="664" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">lowercase a valid email"</text>

  <rect x="980" y="295" width="850" height="430" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1020" y="370" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="700" fill="#ffffff">B - Implementation from test</text>
  <rect x="1020" y="390" width="200" height="3" fill="#8b7fd4"/>
  <text x="1020" y="450" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Write the test yourself, attach it,</text>
  <text x="1020" y="490" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">and have Copilot reverse-engineer</text>
  <text x="1020" y="530" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">a passing implementation.</text>
  <text x="1020" y="600" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">"#file:email.test.ts Write an</text>
  <text x="1020" y="632" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">implementation of validateEmail that</text>
  <text x="1020" y="664" font-family="'Consolas', 'Courier New', monospace" font-size="24" fill="#9a90c8">makes all these tests pass"</text>

  <rect x="90" y="755" width="1740" height="170" rx="24" fill="#8b7fd4" fill-opacity="0.15" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="820" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="700" fill="#ffffff">Gotcha - green is not the same as correct</text>
  <text x="130" y="875" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Copilot may pass the tests while hardcoding values or missing edges the tests don't cover.</text>
  <text x="130" y="908" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Always review the implementation - don't just check that the suite is green.</text>
</svg>
