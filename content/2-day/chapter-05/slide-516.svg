<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">The # Variables</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Use # to pin exact context into a single prompt - precise and fast.
  </text>

  <rect x="90" y="290" width="560" height="280" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="365" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="700" fill="#8b7fd4">#file</text>
  <rect x="130" y="385" width="180" height="3" fill="#8b7fd4"/>
  <text x="130" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Attach a named file in full.</text>
  <text x="130" y="485" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">More reliable than tab scanning -</text>
  <text x="130" y="525" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">you control what's in context.</text>

  <rect x="680" y="290" width="560" height="280" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="720" y="365" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="700" fill="#8b7fd4">#selection</text>
  <rect x="720" y="385" width="180" height="3" fill="#8b7fd4"/>
  <text x="720" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">The text selected in the editor.</text>
  <text x="720" y="485" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">No copy-paste. "Rewrite</text>
  <text x="720" y="525" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">#selection using Strategy."</text>

  <rect x="1270" y="290" width="560" height="280" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1310" y="365" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="700" fill="#8b7fd4">#codebase</text>
  <rect x="1310" y="385" width="180" height="3" fill="#8b7fd4"/>
  <text x="1310" y="445" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Semantic search as an inline</text>
  <text x="1310" y="485" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">variable - pulls snippets for</text>
  <text x="1310" y="525" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">one prompt, not the whole chat.</text>

  <rect x="90" y="600" width="850" height="280" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="675" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="700" fill="#8b7fd4">#sym</text>
  <rect x="130" y="695" width="180" height="3" fill="#8b7fd4"/>
  <text x="130" y="755" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Reference a named symbol - Copilot pulls its</text>
  <text x="130" y="795" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">definition and usages. More targeted than a</text>
  <text x="130" y="835" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">whole file. "Explain #sym:processOrder."</text>

  <rect x="980" y="600" width="850" height="280" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1020" y="675" font-family="'Consolas', 'Courier New', monospace" font-size="40" font-weight="700" fill="#8b7fd4">#def</text>
  <rect x="1020" y="695" width="180" height="3" fill="#8b7fd4"/>
  <text x="1020" y="755" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">The definition of the symbol under the</text>
  <text x="1020" y="795" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">cursor - "Go to Definition" as context.</text>
  <text x="1020" y="835" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">"What breaks if I change #def's signature?"</text>

  <text x="960" y="945" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" fill="#c4baea">Combine them: "#selection doesn't match #file:userModel.ts - update it to comply."</text>
</svg>
