<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">@workspace vs. #file</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Broad when you don't know where it is - precise when you do.
  </text>

  <rect x="130" y="300" width="720" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="490" y="390" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="44" font-weight="700" fill="#ffffff">@workspace</text>
  <rect x="340" y="418" width="300" height="3" fill="#8b7fd4"/>
  <text x="490" y="478" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#8b7fd4">broad &amp; exploratory</text>
  <circle cx="195" cy="555" r="7" fill="#8b7fd4"/>
  <text x="225" y="566" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">you don't know the file</text>
  <circle cx="195" cy="625" r="7" fill="#8b7fd4"/>
  <text x="225" y="636" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">architectural / cross-cutting</text>
  <circle cx="195" cy="695" r="7" fill="#8b7fd4"/>
  <text x="225" y="706" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">1-3 seconds slower (retrieval)</text>
  <text x="490" y="775" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="300" fill="#9a90c8">"How is the payment flow tested?"</text>

  <rect x="1070" y="300" width="720" height="500" rx="28" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1430" y="390" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="44" font-weight="700" fill="#ffffff">#file</text>
  <rect x="1280" y="418" width="300" height="3" fill="#8b7fd4"/>
  <text x="1430" y="478" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#8b7fd4">precise &amp; fast</text>
  <circle cx="1135" cy="555" r="7" fill="#8b7fd4"/>
  <text x="1165" y="566" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">you know exactly which file</text>
  <circle cx="1135" cy="625" r="7" fill="#8b7fd4"/>
  <text x="1165" y="636" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">targeted edits and explanations</text>
  <circle cx="1135" cy="695" r="7" fill="#8b7fd4"/>
  <text x="1165" y="706" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#c4baea">attach several at once</text>
  <text x="1430" y="775" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="25" font-weight="300" fill="#9a90c8">"Refactor createUser in userService.ts"</text>

  <rect x="430" y="855" width="1060" height="70" rx="35" fill="#8b7fd4" opacity="0.22"/>
  <text x="960" y="900" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff" letter-spacing="1">Search to find it - attach it once you know where it lives.</text>
</svg>
