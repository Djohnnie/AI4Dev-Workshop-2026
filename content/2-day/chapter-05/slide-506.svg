<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Fill-in-the-Middle (FIM)</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    Copilot reads above <tspan font-weight="700" fill="#ffffff">and</tspan> below the cursor - the code that follows constrains what it generates.
  </text>

  <rect x="90" y="290" width="980" height="610" rx="20" fill="#1e1b33" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="130" y="360" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#6a5fb8">// prefix - the code above</text>
  <text x="130" y="410" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">function totalPrice(items) {</text>

  <rect x="130" y="450" width="900" height="200" rx="12" fill="#8b7fd4" fill-opacity="0.18" stroke="#8b7fd4" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="580" y="525" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Copilot fills the middle</text>
  <text x="580" y="575" text-anchor="middle" font-family="'Consolas', 'Courier New', monospace" font-size="27" fill="#c4baea">const result = items.reduce(...)</text>
  <text x="580" y="615" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#9a90c8">cursor here &#9474;</text>

  <text x="130" y="710" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">  return result;</text>
  <text x="130" y="760" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#c4baea">}</text>
  <text x="130" y="830" font-family="'Consolas', 'Courier New', monospace" font-size="30" fill="#6a5fb8">// suffix - the code below</text>
  <text x="130" y="870" font-family="'Consolas', 'Courier New', monospace" font-size="26" fill="#9a90c8">a return already exists - the body must populate it</text>

  <rect x="1110" y="290" width="720" height="610" rx="24" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1150" y="360" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">Why it matters</text>
  <rect x="1150" y="380" width="200" height="3" fill="#8b7fd4"/>
  <circle cx="1170" cy="445" r="7" fill="#8b7fd4"/>
  <text x="1200" y="456" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">generated code fits what</text>
  <text x="1200" y="492" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">comes next, not just before</text>
  <circle cx="1170" cy="555" r="7" fill="#8b7fd4"/>
  <text x="1200" y="566" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">an existing return makes the</text>
  <text x="1200" y="602" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">body more accurate</text>

  <text x="1150" y="700" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">The workflow</text>
  <rect x="1150" y="720" width="200" height="3" fill="#8b7fd4"/>
  <text x="1150" y="780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Sketch the structure first -</text>
  <text x="1150" y="818" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">signature at the top, return at</text>
  <text x="1150" y="856" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">the bottom - then fill the middle.</text>
</svg>
