<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#524a96" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="circleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c70c8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3c356c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <circle cx="1750" cy="150" r="420" fill="url(#circleGlow)"/>
  <circle cx="1750" cy="150" r="300" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.35"/>
  <circle cx="165" cy="935" r="350" fill="url(#circleGlow)"/>
  <circle cx="165" cy="935" r="245" fill="none" stroke="#6a5fb8" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="70" font-weight="700" fill="#ffffff" letter-spacing="-1">Priority of Context Signals</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>

  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea" letter-spacing="1">
    The extension ranks these highest-first - the wider the bar, the more weight it carries.
  </text>

  <rect x="90" y="270" width="1660" height="118" rx="18" fill="#8b7fd4" fill-opacity="0.28" stroke="#8b7fd4" stroke-width="1.5"/>
  <circle cx="160" cy="329" r="34" fill="#8b7fd4"/>
  <text x="160" y="343" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">1</text>
  <text x="225" y="320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Cursor position &amp; surrounding code</text>
  <text x="225" y="362" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">the primary signal - language, names in scope, the exact problem being solved</text>

  <rect x="90" y="400" width="1520" height="118" rx="18" fill="#8b7fd4" fill-opacity="0.24" stroke="#8b7fd4" stroke-width="1.5"/>
  <circle cx="160" cy="459" r="34" fill="#8b7fd4"/>
  <text x="160" y="473" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">2</text>
  <text x="225" y="450" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Open editor tabs</text>
  <text x="225" y="492" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">similar-named files score highest - userController pulls in userService, userModel</text>

  <rect x="90" y="530" width="1380" height="118" rx="18" fill="#8b7fd4" fill-opacity="0.20" stroke="#8b7fd4" stroke-width="1.5"/>
  <circle cx="160" cy="589" r="34" fill="#8b7fd4"/>
  <text x="160" y="603" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">3</text>
  <text x="225" y="580" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Imported modules &amp; type definitions</text>
  <text x="225" y="622" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">imports signal the vocabulary - missing ones lead to hallucinated APIs</text>

  <rect x="90" y="660" width="1240" height="118" rx="18" fill="#8b7fd4" fill-opacity="0.16" stroke="#8b7fd4" stroke-width="1.5"/>
  <circle cx="160" cy="719" r="34" fill="#8b7fd4"/>
  <text x="160" y="733" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">4</text>
  <text x="225" y="710" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Comments immediately above the cursor</text>
  <text x="225" y="752" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">your highest-signal manual input - a specific comment is the spec</text>

  <rect x="90" y="790" width="1100" height="118" rx="18" fill="#8b7fd4" fill-opacity="0.12" stroke="#8b7fd4" stroke-width="1.5"/>
  <circle cx="160" cy="849" r="34" fill="#8b7fd4"/>
  <text x="160" y="863" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">5</text>
  <text x="225" y="840" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">copilot-instructions.md</text>
  <text x="225" y="882" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="300" fill="#c4baea">always-on background context - sets style, yields to the signals at the cursor</text>

  <text x="1790" y="970" text-anchor="end" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="27" font-weight="700" fill="#c4baea">highest weight at the top &#x2191;</text>
</svg>
