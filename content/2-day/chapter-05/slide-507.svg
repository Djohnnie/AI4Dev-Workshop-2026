  <text x="960" y="888" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="600" fill="#ffffff" letter-spacing="1">Open the interface, the related services, the test file - then close the irrelevant ones.</text>
