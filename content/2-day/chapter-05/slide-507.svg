  <circle cx="195" cy="485" r="7" fill="#6a5fb8"/>
  <text x="225" y="496" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#9a90c8">generic, statistically-average code</text>
  <circle cx="195" cy="565" r="7" fill="#6a5fb8"/>
  <text x="225" y="576" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="29" font-weight="300" fill="#9a90c8">invented method names</text>
