  <rect x="1070" y="290" width="720" height="490" rx="28" fill="#8b7fd4" fill-opacity="0.15" stroke="#8b7fd4" stroke-width="2"/>
  <text x="1430" y="375" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">3-5 related tabs</text>
  <rect x="1310" y="405" width="240" height="3" fill="#8b7fd4"/>
  <circle cx="1135" cy="485" r="7" fill="#8b7fd4"/>
