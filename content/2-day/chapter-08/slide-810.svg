<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs><radialGradient id="bgGlow" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#524a96" stop-opacity="1"/><stop offset="100%" stop-color="#3c356c" stop-opacity="1"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bgGlow)"/><rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>
  <g transform="translate(1460 58)" opacity="0.18"><text x="0" y="54" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="#c4baea">CHAPTER 6</text><text x="0" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#c4baea">RECAP</text></g>
  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Recap &#x2014; Chapter 6</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">AI Across the Entire Software Lifecycle broadened the perspective: the assistant can support far more than implementation alone.</text>
  <rect x="80" y="235" width="980" height="740" rx="12" fill="#0f1226" fill-opacity="0.72" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="306" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">AI is useful before and after coding too</text>
  <rect x="120" y="356" width="900" height="112" rx="18" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="406" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Analysis and planning</text>
  <text x="160" y="438" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">Use AI to shape requirements, structure work, and clarify the intended result.</text>
  <rect x="120" y="492" width="900" height="120" rx="18" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="542" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Implementation and debugging</text>
  <text x="160" y="574" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">
    <tspan x="160" dy="0">AI can help generate code, explain behavior, investigate failures,</tspan>
    <tspan x="160" dy="28">and accelerate fixes.</tspan>
  </text>
  <rect x="120" y="628" width="900" height="112" rx="18" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="678" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Testing and documentation</text>
  <text x="160" y="710" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">The lifecycle keeps going through verification, explanation, and communication.</text>
  <rect x="120" y="764" width="900" height="124" rx="18" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="816" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#ffffff">Why it matters now</text>
  <text x="160" y="850" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">
    <tspan x="160" dy="0">Lab 801 only works well when you treat the assistant as support across the full</tspan>
    <tspan x="160" dy="28">build loop, not just as a code generator.</tspan>
  </text>
  <rect x="1110" y="235" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="306" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">1</text>
  <text x="1475" y="366" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Full lifecycle view</text>
  <text x="1475" y="410" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">The assistant can help frame work, produce work, and</text>
  <text x="1475" y="444" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">explain work after the code exists.</text>
  <rect x="1110" y="475" width="730" height="250" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="546" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1475" y="606" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Operational thinking</text>
  <text x="1475" y="650" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">A room-based web app raises questions about</tspan>
    <tspan x="1475" dy="32">testing, debugging, flows, and demos &#x2014;</tspan>
    <tspan x="1475" dy="32">not just code completion.</tspan>
  </text>
  <rect x="1110" y="745" width="730" height="230" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="806" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1475" y="860" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Larger-project lesson</text>
  <text x="1475" y="904" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">The best use of AI is not one big answer. It is sustained</text>
  <text x="1475" y="938" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">support across the lifecycle of the task.</text>
</svg>
