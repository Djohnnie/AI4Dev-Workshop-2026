<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs><radialGradient id="bgGlow" cx="50%" cy="50%" r="60%"><stop offset="0%" stop-color="#524a96" stop-opacity="1"/><stop offset="100%" stop-color="#3c356c" stop-opacity="1"/></radialGradient></defs>
  <rect width="1920" height="1080" fill="url(#bgGlow)"/><rect x="0" y="0" width="8" height="1080" fill="#8b7fd4"/>
  <g transform="translate(1460 58)" opacity="0.18"><text x="0" y="54" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="66" font-weight="700" fill="#c4baea">CHAPTER 5</text><text x="0" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#c4baea">RECAP</text></g>
  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Recap &#x2014; Chapter 5</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="300" fill="#c4baea">Speak AI's Language: Mastering Prompts &amp; Context made it clear that the quality of the result depends on the quality of the setup.</text>
  <rect x="80" y="235" width="980" height="760" rx="12" fill="#0f1226" fill-opacity="0.72" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="120" y="306" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Prompting became a design skill</text>
  <text x="120" y="376" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">Better context creates</text>
  <text x="120" y="432" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#ffffff">better engineering output.</text>
  <rect x="120" y="506" width="900" height="144" rx="20" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="562" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">What you learned</text>
  <text x="160" y="610" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="160" dy="0">Prompt wording, working-set selection, and explicit constraints</tspan>
    <tspan x="160" dy="32">influence whether the assistant solves the right problem the right way.</tspan>
  </text>
  <rect x="120" y="676" width="900" height="190" rx="20" fill="rgba(255,255,255,0.05)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="160" y="734" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff">Why it matters in larger systems</text>
  <text x="160" y="780" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="160" dy="0">When the task spans a web client, a .NET server, sockets, and</tspan>
    <tspan x="160" dy="32">gameplay rules, context management is no longer optional.</tspan>
  </text>
  <rect x="1110" y="235" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="306" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">1</text>
  <text x="1475" y="366" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Context window</text>
  <text x="1475" y="410" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">The assistant can only reason over what it has,</tspan>
    <tspan x="1475" dy="32">so the right files and facts directly affect output quality.</tspan>
  </text>
  <rect x="1110" y="475" width="730" height="250" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="546" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1475" y="606" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Prompt precision</text>
  <text x="1475" y="650" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">The more concrete the request,</tspan>
    <tspan x="1475" dy="32">the less time you waste on broad guesses,</tspan>
    <tspan x="1475" dy="32">cleanup, and avoidable rework.</tspan>
  </text>
  <rect x="1110" y="745" width="730" height="250" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="806" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1475" y="860" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Larger-system implication</text>
  <text x="1475" y="904" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">Multiplayer state, room rules,</tspan>
    <tspan x="1475" dy="32">and shared-food behavior all become easier</tspan>
    <tspan x="1475" dy="32">when you frame them precisely for the assistant.</tspan>
  </text>
</svg>
