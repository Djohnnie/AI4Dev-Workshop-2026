    <text x="0" y="118" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#c4baea">LAB 801</text>
  </g>

  <text x="80" y="108" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" letter-spacing="-1">Lab 801 &#x2014; Multiplayer Ultimate Snake</text>
  <rect x="0" y="140" width="1920" height="4" fill="#8b7fd4"/>
  <text x="80" y="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="300" fill="#c4baea">The capstone turns the earlier single-player game into a shared room-based experience with live updates.</text>

  <rect x="80" y="235" width="980" height="740" rx="12" fill="#0f1226" fill-opacity="0.72" stroke="#8b7fd4" stroke-width="1.5"/>

  <rect x="120" y="278" width="900" height="86" rx="18" fill="rgba(255,255,255,0.06)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="156" y="314" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="#c4baea">Chapter 8 · Lab 801</text>
  <text x="156" y="344" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="34" font-weight="700" fill="#ffffff">Ultimate Snake Rooms</text>
  <text x="650" y="314" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#c4baea">Room</text>
  <text x="650" y="344" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#7ee787">AB12</text>
  <text x="770" y="314" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#c4baea">Players</text>
  <text x="772" y="344" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffd866">2 / 4</text>
  <text x="884" y="314" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="500" fill="#c4baea">Phase</text>
  <text x="886" y="344" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">Running</text>

