  <rect x="888" y="432" width="100" height="196" rx="16" fill="rgba(255,255,255,0.06)" stroke="#8b7fd4" stroke-width="1.2"/>
  <text x="938" y="472" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">Players</text>
  <text x="938" y="516" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffd866">Alex</text>
  <text x="938" y="540" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="300" fill="#c4baea">Host · 3</text>
  <text x="938" y="584" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="700" fill="#58a6ff">Sam</text>
  <text x="938" y="608" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="300" fill="#c4baea">Player · 2</text>

  <text x="160" y="902" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="300" fill="#c4baea">
    <tspan x="160" dy="0">Shared room code, shared board, shared snack, and several</tspan>
    <tspan x="160" dy="28">snakes visible at once.</tspan>
  </text>

  <rect x="1110" y="235" width="730" height="230" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="304" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">1</text>
  <text x="1475" y="360" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Build target</text>
  <text x="1475" y="404" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">Create a browser-based multiplayer Snake game with</text>
  <text x="1475" y="438" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">room creation, joining by code, and a shared board.</text>

  <rect x="1110" y="495" width="730" height="220" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="566" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">2</text>
  <text x="1475" y="626" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Core multiplayer twist</text>
  <text x="1475" y="670" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">Several snakes race toward one shared food item.</tspan>
    <tspan x="1475" dy="32">The server decides who wins and what collides.</tspan>
  </text>

  <rect x="1110" y="745" width="730" height="250" rx="12" fill="#ffffff" fill-opacity="0.07" stroke="#8b7fd4" stroke-width="1.5"/>
  <text x="1475" y="806" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#8b7fd4">3</text>
  <text x="1475" y="860" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="#ffffff">Why it is the capstone</text>
  <text x="1475" y="904" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="300" fill="#c4baea">
    <tspan x="1475" dy="0">This lab combines UI design, server state,</tspan>
    <tspan x="1475" dy="32">real-time sync, Copilot workflow choices,</tspan>
    <tspan x="1475" dy="32">and demo-ready behavior.</tspan>
  </text>
