<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#a371f7"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="90" fill="#f0f6fc" font-size="46" font-weight="700">AI4Dev Workshop 2026 — Survey Results at a Glance</text>
  <text x="80" y="130" fill="#8b949e" font-size="22">28 participants · 20 questions · Familiarity scored 0–100 across foundations, tooling, prompting, security &amp; workflow</text>
  <line x1="80" y1="155" x2="1840" y2="155" stroke="#30363d" stroke-width="2"/>

  <!-- KPI 1: Average Familiarity ring -->
  <g transform="translate(80,200)" filter="url(#card)">
    <rect width="430" height="320" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#8b949e" font-size="20" font-weight="600">AVERAGE FAMILIARITY</text>
    <g transform="translate(215,180)">
      <circle r="100" fill="none" stroke="#21262d" stroke-width="22"/>
      <circle r="100" fill="none" stroke="url(#ringGrad)" stroke-width="22" stroke-linecap="round"
              stroke-dasharray="252.9 628.3" transform="rotate(-90)"/>
      <text text-anchor="middle" y="10" fill="#f0f6fc" font-size="56" font-weight="700">40.3</text>
      <text text-anchor="middle" y="42" fill="#8b949e" font-size="18">/ 100</text>
    </g>
    <text x="30" y="295" fill="#8b949e" font-size="16">Range 5.7 — 75.9 · Median ~40 · 18 of 28 score &lt; 50</text>
  </g>

  <!-- KPI 2: Cohorts stacked bar -->
  <g transform="translate(540,200)" filter="url(#card)">
    <rect width="700" height="320" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#8b949e" font-size="20" font-weight="600">THREE COHORTS</text>
    <text x="30" y="80" fill="#f0f6fc" font-size="14">Split by descending familiarity score — drives pacing &amp; pairing</text>

    <!-- Stacked bar -->
    <g transform="translate(30,115)">
      <rect width="640" height="50" rx="8" fill="#21262d"/>
      <rect width="183" height="50" rx="8" fill="#3fb950"/>
      <rect x="183" width="229" height="50" fill="#58a6ff"/>
      <rect x="412" width="228" height="50" rx="8" fill="#d29922"/>
      <text x="91" y="32" text-anchor="middle" fill="#0d1117" font-size="20" font-weight="700">8</text>
      <text x="297" y="32" text-anchor="middle" fill="#0d1117" font-size="20" font-weight="700">10</text>
      <text x="526" y="32" text-anchor="middle" fill="#0d1117" font-size="20" font-weight="700">10</text>
    </g>

    <!-- Legend -->
    <g transform="translate(30,200)" font-size="15" fill="#c9d1d9">
      <g>
        <rect width="14" height="14" fill="#3fb950" rx="3"/>
        <text x="22" y="12" font-weight="700" fill="#f0f6fc">🥇 Most Advanced</text>
        <text x="22" y="34" fill="#8b949e">Avg 62.0 · Daily users · Agent &amp; Edits</text>
      </g>
      <g transform="translate(220,0)">
        <rect width="14" height="14" fill="#58a6ff" rx="3"/>
        <text x="22" y="12" font-weight="700" fill="#f0f6fc">🥈 More Advanced</text>
        <text x="22" y="34" fill="#8b949e">Avg 43.5 · Solid prompting · gaps in adv. features</text>
      </g>
      <g transform="translate(470,0)">
        <rect width="14" height="14" fill="#d29922" rx="3"/>
        <text x="22" y="12" font-weight="700" fill="#f0f6fc">🥉 Basics</text>
        <text x="22" y="34" fill="#8b949e">Avg 19.5 · Need foundations &amp; fluency</text>
      </g>
    </g>

    <text x="30" y="295" fill="#8b949e" font-size="14">Tip: pair top-cohort participants with basics during hands-on labs for peer-learning lift.</text>
  </g>

  <!-- KPI 3: Most challenging loop step -->
  <g transform="translate(1270,200)" filter="url(#card)">
    <rect width="570" height="320" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#8b949e" font-size="20" font-weight="600">MOST CHALLENGING LOOP STEP (Q17)</text>

    <g transform="translate(30,80)" font-size="16" fill="#c9d1d9">
      <!-- 13 -->
      <text y="14" fill="#f0f6fc" font-weight="600">No deliberate loop</text>
      <text x="540" y="14" text-anchor="end" fill="#f85149" font-weight="700">13 (46%)</text>
      <rect y="22" width="540" height="14" rx="4" fill="#21262d"/>
      <rect y="22" width="540" height="14" rx="4" fill="#f85149"/>

      <text y="74" fill="#f0f6fc" font-weight="600">Review — judging correctness/security</text>
      <text x="540" y="74" text-anchor="end" fill="#d29922" font-weight="700">6 (21%)</text>
      <rect y="82" width="540" height="14" rx="4" fill="#21262d"/>
      <rect y="82" width="249" height="14" rx="4" fill="#d29922"/>

      <text y="134" fill="#f0f6fc" font-weight="600">Think — clarifying intent</text>
      <text x="540" y="134" text-anchor="end" fill="#58a6ff" font-weight="700">3 (11%)</text>
      <rect y="142" width="540" height="14" rx="4" fill="#21262d"/>
      <rect y="142" width="125" height="14" rx="4" fill="#58a6ff"/>

      <text y="194" fill="#f0f6fc" font-weight="600">Prompt — reliable output</text>
      <text x="540" y="194" text-anchor="end" fill="#58a6ff" font-weight="700">3 (11%)</text>
      <rect y="202" width="540" height="14" rx="4" fill="#21262d"/>
      <rect y="202" width="125" height="14" rx="4" fill="#58a6ff"/>

      <text y="234" fill="#f0f6fc" font-weight="600">Iterate — refine vs. edit</text>
      <text x="540" y="234" text-anchor="end" fill="#58a6ff" font-weight="700">3 (11%)</text>
      <rect y="242" width="540" height="14" rx="4" fill="#21262d"/>
      <rect y="242" width="125" height="14" rx="4" fill="#58a6ff"/>
    </g>
  </g>

  <!-- Bottom row — 4 highlight cards -->
  <g transform="translate(80,560)">
    <!-- Card A -->
    <g filter="url(#card)">
      <rect width="420" height="220" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="30" y="50" fill="#8b949e" font-size="18" font-weight="600">DAILY COPILOT USE (Q4)</text>
      <text x="30" y="120" fill="#3fb950" font-size="68" font-weight="700">3.18<tspan font-size="28" fill="#8b949e">/4</tspan></text>
      <text x="30" y="160" fill="#c9d1d9" font-size="16">Strong adoption baseline —</text>
      <text x="30" y="184" fill="#c9d1d9" font-size="16">most use Copilot regularly or daily.</text>
    </g>
    <!-- Card B -->
    <g transform="translate(440,0)" filter="url(#card)">
      <rect width="420" height="220" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="30" y="50" fill="#8b949e" font-size="18" font-weight="600">REVIEW RIGOR (Q16)</text>
      <text x="30" y="120" fill="#3fb950" font-size="68" font-weight="700">3.64<tspan font-size="28" fill="#8b949e">/5</tspan></text>
      <text x="30" y="160" fill="#c9d1d9" font-size="16">Healthy skepticism —</text>
      <text x="30" y="184" fill="#c9d1d9" font-size="16">most read AI output line-by-line.</text>
    </g>
    <!-- Card C -->
    <g transform="translate(880,0)" filter="url(#card)">
      <rect width="420" height="220" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="30" y="50" fill="#8b949e" font-size="18" font-weight="600">ADVANCED FEATURES (Q7)</text>
      <text x="30" y="120" fill="#d29922" font-size="68" font-weight="700">2.15<tspan font-size="28" fill="#8b949e">/5</tspan></text>
      <text x="30" y="160" fill="#c9d1d9" font-size="16">Big growth area —</text>
      <text x="30" y="184" fill="#c9d1d9" font-size="16">CLI &amp; Prompt Files barely used.</text>
    </g>
    <!-- Card D -->
    <g transform="translate(1320,0)" filter="url(#card)">
      <rect width="420" height="220" rx="18" fill="#161b22" stroke="#30363d"/>
      <text x="30" y="50" fill="#8b949e" font-size="18" font-weight="600">TEAM AI GOVERNANCE (Q18)</text>
      <text x="30" y="120" fill="#f85149" font-size="68" font-weight="700">1.64<tspan font-size="28" fill="#8b949e">/4</tspan></text>
      <text x="30" y="160" fill="#c9d1d9" font-size="16">Mostly informal or absent —</text>
      <text x="30" y="184" fill="#c9d1d9" font-size="16">policy primer benefits everyone.</text>
    </g>
  </g>

  <!-- Top blockers panel -->
  <g transform="translate(80,820)" filter="url(#card)">
    <rect width="1760" height="200" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#8b949e" font-size="20" font-weight="600">TOP THEMES IN OPEN-TEXT BLOCKERS &amp; GOALS</text>

    <g transform="translate(30,80)" font-size="16">
      <g>
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#58a6ff" font-size="22" font-weight="700">Trust &amp; quality</text>
        <text x="20" y="58" fill="#c9d1d9">Hallucinations · over-reliance ·</text>
        <text x="20" y="78" fill="#c9d1d9">verifying correctness</text>
      </g>
      <g transform="translate(290,0)">
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#a371f7" font-size="22" font-weight="700">Prompt skills</text>
        <text x="20" y="58" fill="#c9d1d9">Getting context right ·</text>
        <text x="20" y="78" fill="#c9d1d9">structured prompting</text>
      </g>
      <g transform="translate(580,0)">
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#3fb950" font-size="22" font-weight="700">Org policy &amp; access</text>
        <text x="20" y="58" fill="#c9d1d9">Tool availability ·</text>
        <text x="20" y="78" fill="#c9d1d9">approved models</text>
      </g>
      <g transform="translate(870,0)">
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#d29922" font-size="22" font-weight="700">Time to learn</text>
        <text x="20" y="58" fill="#c9d1d9">Keeping up · discovering</text>
        <text x="20" y="78" fill="#c9d1d9">advanced features</text>
      </g>
      <g transform="translate(1160,0)">
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#f85149" font-size="22" font-weight="700">Security concerns</text>
        <text x="20" y="58" fill="#c9d1d9">Data leakage · unsafe code ·</text>
        <text x="20" y="78" fill="#c9d1d9">supply chain</text>
      </g>
      <g transform="translate(1450,0)">
        <rect width="270" height="90" rx="10" fill="#21262d" stroke="#30363d"/>
        <text x="20" y="30" fill="#58a6ff" font-size="22" font-weight="700">Workshop goal</text>
        <text x="20" y="58" fill="#c9d1d9">Understand internals ·</text>
        <text x="20" y="78" fill="#c9d1d9">prompt better · agent mode</text>
      </g>
    </g>
  </g>

  <text x="1840" y="1060" text-anchor="end" fill="#484f58" font-size="14">Source: survey/SURVEY_RESULTS.md · n=28</text>
</svg>
