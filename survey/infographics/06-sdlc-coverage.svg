<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="80" y="90" fill="#f0f6fc" font-size="46" font-weight="700">SDLC Coverage — Where AI Is (and Isn't) Used Yet</text>
  <text x="80" y="130" fill="#8b949e" font-size="22">Q14 · For each lifecycle phase, the % of each cohort using AI there. Reveals downstream phases that are barely touched.</text>
  <line x1="80" y1="155" x2="1840" y2="155" stroke="#30363d" stroke-width="2"/>

  <!-- Stacked grouped bars per phase. Layout: 7 phase groups, 3 bars each -->
  <g transform="translate(80,200)" filter="url(#card)">
    <rect width="1760" height="700" rx="18" fill="#161b22" stroke="#30363d"/>

    <!-- Legend -->
    <g transform="translate(30,40)" font-size="15">
      <rect width="14" height="14" fill="#3fb950" rx="3"/><text x="22" y="12" fill="#c9d1d9">🥇 Most Advanced (n=8)</text>
      <g transform="translate(220,0)"><rect width="14" height="14" fill="#58a6ff" rx="3"/><text x="22" y="12" fill="#c9d1d9">🥈 More Advanced (n=10)</text></g>
      <g transform="translate(450,0)"><rect width="14" height="14" fill="#d29922" rx="3"/><text x="22" y="12" fill="#c9d1d9">🥉 Basics (n=10)</text></g>
      <text x="1700" y="12" text-anchor="end" fill="#8b949e">All values are % of cohort</text>
    </g>

    <!-- Phases. Each row 80px high. Bar group: y=label, bars at +30 height 16 each, max width 1100. -->
    <!-- Phase 1: Writing new code 88/40/20 -->
    <g transform="translate(30,90)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">1 · Writing new code (features, logic, algorithms)</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="968" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">88%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="440" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">40%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><rect y="40" width="220" height="16" rx="4" fill="#d29922"/><text x="1115" y="53" fill="#d29922" font-weight="700">20%</text>
      </g>
    </g>

    <!-- Phase 2: Tests 88/50/0 -->
    <g transform="translate(30,170)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">2 · Writing or extending unit / integration tests</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="968" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">88%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="550" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">50%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><text x="1115" y="53" fill="#d29922" font-weight="700">0%</text>
      </g>
    </g>

    <!-- Phase 3: Debugging 88/90/10 -->
    <g transform="translate(30,250)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">3 · Debugging — diagnosing errors, fixing failing tests</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="968" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">88%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="990" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">90%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><rect y="40" width="110" height="16" rx="4" fill="#d29922"/><text x="1115" y="53" fill="#d29922" font-weight="700">10%</text>
      </g>
    </g>

    <!-- Phase 4: Refactor 88/70/10 -->
    <g transform="translate(30,330)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">4 · Refactoring existing code</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="968" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">88%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="770" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">70%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><rect y="40" width="110" height="16" rx="4" fill="#d29922"/><text x="1115" y="53" fill="#d29922" font-weight="700">10%</text>
      </g>
    </g>

    <!-- Phase 5: Docs 100/60/20 -->
    <g transform="translate(30,410)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">5 · Generating / updating documentation</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="1100" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">100%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="660" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">60%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><rect y="40" width="220" height="16" rx="4" fill="#d29922"/><text x="1115" y="53" fill="#d29922" font-weight="700">20%</text>
      </g>
    </g>

    <!-- Phase 6: Code review 13/40/0 -->
    <g transform="translate(30,490)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">6 · Code review (PRs, AI review of own code)</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="143" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">13%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="440" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">40%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><text x="1115" y="53" fill="#d29922" font-weight="700">0%</text>
      </g>
    </g>

    <!-- Phase 7: PR descriptions 25/20/10 -->
    <g transform="translate(30,570)" font-size="15" fill="#c9d1d9">
      <text y="20" font-weight="600">7 · Writing pull request descriptions / summaries</text>
      <g transform="translate(450,5)">
        <rect width="1100" height="16" rx="4" fill="#21262d"/><rect width="275" height="16" rx="4" fill="#3fb950"/><text x="1115" y="13" fill="#3fb950" font-weight="700">25%</text>
        <rect y="20" width="1100" height="16" rx="4" fill="#21262d"/><rect y="20" width="220" height="16" rx="4" fill="#58a6ff"/><text x="1115" y="33" fill="#58a6ff" font-weight="700">20%</text>
        <rect y="40" width="1100" height="16" rx="4" fill="#21262d"/><rect y="40" width="110" height="16" rx="4" fill="#d29922"/><text x="1115" y="53" fill="#d29922" font-weight="700">10%</text>
      </g>
    </g>

    <line x1="1525" y1="80" x2="1525" y2="660" stroke="#30363d" stroke-width="1" stroke-dasharray="4 4"/>
  </g>

  <!-- Bottom insight strip -->
  <g transform="translate(80,920)" filter="url(#card)">
    <rect width="1760" height="140" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="40" fill="#a371f7" font-size="20" font-weight="700">📊 PATTERNS WORTH NOTICING</text>
    <g transform="translate(30,60)" font-size="15" fill="#c9d1d9">
      <g><rect width="420" height="60" rx="10" fill="#21262d"/><text x="20" y="25" fill="#3fb950" font-weight="700">Code, debug, docs &amp; refactor</text>
        <text x="20" y="48" fill="#8b949e">Universally adopted by Most Advanced — push them to next horizons.</text></g>
      <g transform="translate(440,0)"><rect width="420" height="60" rx="10" fill="#21262d"/><text x="20" y="25" fill="#d29922" font-weight="700">Tests, code review &amp; PR descriptions</text>
        <text x="20" y="48" fill="#8b949e">Major underuse across all cohorts — easy productivity wins.</text></g>
      <g transform="translate(880,0)"><rect width="420" height="60" rx="10" fill="#21262d"/><text x="20" y="25" fill="#f85149" font-weight="700">Basics cohort: tests &amp; review = 0%</text>
        <text x="20" y="48" fill="#8b949e">Many haven't even tried — start with /tests scaffolding.</text></g>
      <g transform="translate(1320,0)"><rect width="420" height="60" rx="10" fill="#21262d"/><text x="20" y="25" fill="#58a6ff" font-weight="700">Mid debugs more than tops</text>
        <text x="20" y="48" fill="#8b949e">90% vs 88% — debugging is the universal entry point.</text></g>
    </g>
  </g>

  <text x="1840" y="1075" text-anchor="end" fill="#484f58" font-size="14">Source: survey/SURVEY_RESULTS.md · n=28</text>
</svg>
