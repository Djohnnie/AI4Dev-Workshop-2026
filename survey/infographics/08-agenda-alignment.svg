<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a371f7"/>
    </marker>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="80" y="90" fill="#f0f6fc" font-size="46" font-weight="700">Agenda Alignment — Why We're Covering What We're Covering</text>
  <text x="80" y="130" fill="#8b949e" font-size="22">Each survey gap on the left maps directly to a 2-day workshop chapter on the right.</text>
  <line x1="80" y1="155" x2="1840" y2="155" stroke="#30363d" stroke-width="2"/>

  <!-- Left: Survey Gaps -->
  <g transform="translate(60,200)">
    <text x="20" y="0" fill="#f85149" font-size="22" font-weight="700">📉 SURVEY GAPS &amp; NEEDS</text>

    <!-- Gap pills, fixed widths 540 -->
    <g transform="translate(0,30)" font-size="15">
      <g><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G1 · How LLMs work feels fuzzy</text>
        <text x="20" y="52" fill="#8b949e">Q2 = 2.46/5 · Q1 = 2.14/4 · "tokens, hallucinations"</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 1</text></g>

      <g transform="translate(0,90)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G2 · Inline + Chat fluency under-developed</text>
        <text x="20" y="52" fill="#8b949e">Q5 = 1.71/7 · Q6 = 1.61/7 · half haven't used Chat cmds</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 2</text></g>

      <g transform="translate(0,180)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G3 · Data flow + governance unclear</text>
        <text x="20" y="52" fill="#8b949e">Q12 = 2.21/4 · Q18 = 1.64/4 · privacy hygiene patchy</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 3</text></g>

      <g transform="translate(0,270)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G4 · Agent Mode &amp; Edits barely used</text>
        <text x="20" y="52" fill="#8b949e">Agent 2.32/5 · Edits 2.07/5 · "let it take the wheel"</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 4</text></g>

      <g transform="translate(0,360)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G5 · Prompting is the #1 stated goal</text>
        <text x="20" y="52" fill="#8b949e">Q8 = 2.75/5 · 11/28 explicitly want better prompting</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 5</text></g>

      <g transform="translate(0,450)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G6 · Tests, review &amp; PRs are blind spots</text>
        <text x="20" y="52" fill="#8b949e">Q14 — code review 18%, PR descriptions 18%, tests &amp; security under-checked</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 6</text></g>

      <g transform="translate(0,540)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G7 · No deliberate Think→Prompt→Review→Iterate loop</text>
        <text x="20" y="52" fill="#8b949e">Q17 — 46% (13/28) work ad-hoc · weak review of AI output</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 7</text></g>

      <g transform="translate(0,630)"><rect width="540" height="76" rx="10" fill="#21262d" stroke="#f85149"/>
        <text x="20" y="28" fill="#f0f6fc" font-weight="700">G8 · Need to practice on realistic problems</text>
        <text x="20" y="52" fill="#8b949e">Many haven't applied AI to refactoring, debugging or test workflows</text>
        <text x="520" y="52" text-anchor="end" fill="#f85149" font-weight="700">→ Ch 8</text></g>
    </g>
  </g>

  <!-- Center arrows -->
  <g stroke="#a371f7" stroke-width="2" fill="none">
    <line x1="610" y1="268" x2="1080" y2="268" marker-end="url(#arrow)"/>
    <line x1="610" y1="358" x2="1080" y2="358" marker-end="url(#arrow)"/>
    <line x1="610" y1="448" x2="1080" y2="448" marker-end="url(#arrow)"/>
    <line x1="610" y1="538" x2="1080" y2="538" marker-end="url(#arrow)"/>
    <line x1="610" y1="628" x2="1080" y2="628" marker-end="url(#arrow)"/>
    <line x1="610" y1="718" x2="1080" y2="718" marker-end="url(#arrow)"/>
    <line x1="610" y1="808" x2="1080" y2="808" marker-end="url(#arrow)"/>
    <line x1="610" y1="898" x2="1080" y2="898" marker-end="url(#arrow)"/>
  </g>

  <!-- Right: Workshop Chapters (2-day) -->
  <g transform="translate(1080,200)">
    <text x="20" y="0" fill="#3fb950" font-size="22" font-weight="700">📚 2-DAY WORKSHOP CHAPTERS</text>

    <g transform="translate(0,30)" font-size="15">
      <!-- Ch 1 -->
      <g><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 1 · Welcome to the AI Revolution</text>
        <text x="20" y="52" fill="#c9d1d9">AI taxonomy · How LLMs work · tokens · hallucinations · model trade-offs</text></g>
      <!-- Ch 2 -->
      <g transform="translate(0,90)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 2 · Meet Your New Best Friend: GitHub Copilot</text>
        <text x="20" y="52" fill="#c9d1d9">Inline completion shortcuts · slash / @ / # commands · Completions Panel</text></g>
      <!-- Ch 3 -->
      <g transform="translate(0,180)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 3 · Power with Purpose: Using AI Responsibly</text>
        <text x="20" y="52" fill="#c9d1d9">Data flow · tier rules · privacy · security checklist · governance basics</text></g>
      <!-- Ch 4 -->
      <g transform="translate(0,270)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 4 · Let Your AI Co-Pilot Take the Wheel</text>
        <text x="20" y="52" fill="#c9d1d9">Agent Mode · Copilot Edits · multi-file workflows · approval loops</text></g>
      <!-- Ch 5 -->
      <g transform="translate(0,360)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 5 · Speak AI's Language: Mastering Prompts &amp; Context</text>
        <text x="20" y="52" fill="#c9d1d9">Prompting frameworks · custom instructions · prompt files · #file context</text></g>
      <!-- Ch 6 -->
      <g transform="translate(0,450)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 6 · AI Across the Entire Software Lifecycle</text>
        <text x="20" y="52" fill="#c9d1d9">Tests · debugging · refactoring · code review · PR descriptions · docs</text></g>
      <!-- Ch 7 -->
      <g transform="translate(0,540)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 7 · Level Up: Best Practices for AI-Powered Development</text>
        <text x="20" y="52" fill="#c9d1d9">Think → Prompt → Review → Iterate loop · review rigor · model selection</text></g>
      <!-- Ch 8 -->
      <g transform="translate(0,630)"><rect width="780" height="76" rx="10" fill="#21262d" stroke="#3fb950"/>
        <text x="20" y="28" fill="#3fb950" font-weight="700">Chapter 8 · Get Your Hands Dirty: Real-World AI in Action</text>
        <text x="20" y="52" fill="#c9d1d9">End-to-end labs · refactor / test / debug / agent flows on realistic code</text></g>
    </g>
  </g>

  <!-- Bottom note -->
  <g transform="translate(80,950)" filter="url(#card)">
    <rect width="1760" height="100" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="40" fill="#a371f7" font-size="18" font-weight="700">🎯 RUNNING THREADS — woven across chapters, not parked in one</text>
    <text x="30" y="72" fill="#c9d1d9" font-size="15">▸ Responsible-AI primer (Ch 3) is short but every later chapter applies it  ·  ▸ Security checklist surfaces in Ch 6, 7, 8  ·  ▸ Mixed-cohort pairing for hands-on labs lifts both ends.</text>
  </g>

  <text x="1840" y="1075" text-anchor="end" fill="#484f58" font-size="14">Source: survey/SURVEY_RESULTS.md · content/2-day/chapter-* · n=28</text>
</svg>
