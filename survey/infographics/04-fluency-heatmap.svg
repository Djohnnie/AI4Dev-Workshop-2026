<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <filter id="card" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <text x="80" y="90" fill="#f0f6fc" font-size="46" font-weight="700">Inline &amp; Chat Fluency — What People Actually Use</text>
  <text x="80" y="130" fill="#8b949e" font-size="22">% of 28 participants who tick each interaction. Anything &lt; 30% is a clear hands-on lab opportunity.</text>
  <line x1="80" y1="155" x2="1840" y2="155" stroke="#30363d" stroke-width="2"/>

  <!-- Q5 panel -->
  <g transform="translate(80,200)" filter="url(#card)">
    <rect width="870" height="800" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#58a6ff" font-size="22" font-weight="700">Q5 · INLINE COMPLETIONS (ghost text)</text>
    <text x="30" y="80" fill="#8b949e" font-size="15">Group avg: 1.71 of 7 interactions used</text>

    <!-- bars: width factor *7 ; max 700 -->
    <g transform="translate(30,110)" font-size="15" fill="#c9d1d9">
      <!-- Tab 54% -->
      <g><text y="20">Tab — accept full suggestion</text><text x="800" y="20" text-anchor="end" fill="#3fb950" font-weight="700">54%  (15)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="430" height="22" rx="6" fill="#3fb950"/></g>
      <g transform="translate(0,80)"><text y="20">Esc — dismiss suggestion</text><text x="800" y="20" text-anchor="end" fill="#3fb950" font-weight="700">54%  (15)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="430" height="22" rx="6" fill="#3fb950"/></g>
      <g transform="translate(0,160)"><text y="20">Guiding completions with a comment above the cursor</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">25%  (7)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="200" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,240)"><text y="20">Comment-driven development (algorithm steps as comments)</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">21%  (6)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="171" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,320)"><text y="20">Ctrl+Enter — Completions Panel (10 alternatives)</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">11%  (3)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="86" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,400)"><text y="20">Ctrl+→ — partial accept (word-by-word)</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">7%  (2)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="57" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,480)"><text y="20">Alt+] / Alt+[ — cycle alternative suggestions</text><text x="800" y="20" text-anchor="end" fill="#8b949e" font-weight="700">0%  (0)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/></g>
      <g transform="translate(0,560)"><text y="20" font-style="italic" fill="#f85149">None of the above</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">36%  (10)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="286" height="22" rx="6" fill="#f85149" opacity="0.5"/></g>
    </g>
    <text x="30" y="775" fill="#8b949e" font-size="14">💡 Lab idea: pair-programming round on partial-accept, alternative cycling and comment-driven prompts.</text>
  </g>

  <!-- Q6 panel -->
  <g transform="translate(970,200)" filter="url(#card)">
    <rect width="870" height="800" rx="18" fill="#161b22" stroke="#30363d"/>
    <text x="30" y="50" fill="#a371f7" font-size="22" font-weight="700">Q6 · CHAT SLASH / @ / # COMMANDS</text>
    <text x="30" y="80" fill="#8b949e" font-size="15">Group avg: 1.61 of 7 commands used · 50% have not used any</text>

    <g transform="translate(30,110)" font-size="15" fill="#c9d1d9">
      <g><text y="20">#file / #selection — attach specific context</text><text x="800" y="20" text-anchor="end" fill="#d29922" font-weight="700">32%  (9)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="257" height="22" rx="6" fill="#d29922"/></g>
      <g transform="translate(0,80)"><text y="20">@workspace — questions across the project</text><text x="800" y="20" text-anchor="end" fill="#d29922" font-weight="700">29%  (8)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="229" height="22" rx="6" fill="#d29922"/></g>
      <g transform="translate(0,160)"><text y="20">/explain — understand unfamiliar code</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">25%  (7)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="200" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,240)"><text y="20">/fix — diagnose &amp; repair broken code</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">25%  (7)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="200" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,320)"><text y="20">/doc — generate docstrings / docs</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">25%  (7)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="200" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,400)"><text y="20">/tests — generate unit tests</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">18%  (5)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="143" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,480)"><text y="20">@terminal — explain / generate shell commands</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">7%  (2)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="57" height="22" rx="6" fill="#f85149"/></g>
      <g transform="translate(0,560)"><text y="20" font-style="italic" fill="#f85149">None — never used Chat commands</text><text x="800" y="20" text-anchor="end" fill="#f85149" font-weight="700">50%  (14)</text>
        <rect y="30" width="800" height="22" rx="6" fill="#21262d"/><rect y="30" width="400" height="22" rx="6" fill="#f85149" opacity="0.5"/></g>
    </g>
    <text x="30" y="775" fill="#8b949e" font-size="14">💡 Lab idea: a 30-min "Chat command speedrun" — every participant must use /explain, /fix, /tests, @workspace, #file at least once.</text>
  </g>

  <!-- Bottom legend -->
  <g transform="translate(80,1020)" font-size="14" fill="#8b949e">
    <rect width="14" height="14" fill="#3fb950" rx="3"/><text x="22" y="12">≥ 50% adoption</text>
    <g transform="translate(140,0)"><rect width="14" height="14" fill="#d29922" rx="3"/><text x="22" y="12">25–50%</text></g>
    <g transform="translate(260,0)"><rect width="14" height="14" fill="#f85149" rx="3"/><text x="22" y="12">&lt; 25% — workshop opportunity</text></g>
    <text x="1840" y="12" text-anchor="end" fill="#484f58">Source: survey/SURVEY_RESULTS.md · n=28</text>
  </g>
</svg>
